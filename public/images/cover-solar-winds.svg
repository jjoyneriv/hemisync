<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="sw-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#2a1800"/>
      <stop offset="45%" stop-color="#180e00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <radialGradient id="sw-nebula1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#e65100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sw-nebula2" cx="45%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ffc107" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ff8f00" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sw-nebula3" cx="55%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sw-corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="15%" stop-color="#fff9c4" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#ffeb3b" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff9800" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#e65100" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sw-flare1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff9800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e65100" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sw-wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffc107" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffeb3b" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#ffc107" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0"/>
    </linearGradient>
    <filter id="sw-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="sw-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="sw-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="sw-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sw-brightglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#sw-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="400" cy="320" rx="300" ry="240" fill="url(#sw-nebula1)" filter="url(#sw-blur1)"/>
  <ellipse cx="360" cy="360" rx="250" ry="200" fill="url(#sw-nebula2)" filter="url(#sw-blur1)"/>
  <ellipse cx="440" cy="300" rx="200" ry="160" fill="url(#sw-nebula3)" filter="url(#sw-blur1)"/>

  <!-- Stars -->
  <circle cx="95" cy="60" r="1.2" fill="#fff9c4" opacity="0.5"/>
  <circle cx="220" cy="45" r="0.8" fill="#ffe082" opacity="0.4"/>
  <circle cx="380" cy="70" r="1.4" fill="#ffffff" opacity="0.55"/>
  <circle cx="525" cy="55" r="1" fill="#fff9c4" opacity="0.45"/>
  <circle cx="655" cy="85" r="1.3" fill="#ffffff" opacity="0.4"/>
  <circle cx="715" cy="35" r="0.9" fill="#ffe082" opacity="0.35"/>
  <circle cx="70" cy="210" r="1.1" fill="#ffffff" opacity="0.4"/>
  <circle cx="740" cy="240" r="1" fill="#fff9c4" opacity="0.35"/>
  <circle cx="50" cy="370" r="0.9" fill="#ffe082" opacity="0.35"/>
  <circle cx="760" cy="360" r="1.1" fill="#ffffff" opacity="0.4"/>
  <circle cx="135" cy="145" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="670" cy="150" r="0.7" fill="#fff9c4" opacity="0.5"/>
  <circle cx="170" cy="450" r="1" fill="#ffffff" opacity="0.35"/>
  <circle cx="630" cy="460" r="1.2" fill="#ffe082" opacity="0.4"/>
  <circle cx="475" cy="100" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="315" cy="490" r="1.1" fill="#fff9c4" opacity="0.3"/>
  <circle cx="560" cy="740" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="250" cy="720" r="0.9" fill="#ffe082" opacity="0.35"/>

  <!-- Solar flare radiating lines -->
  <line x1="400" y1="310" x2="400" y2="100" stroke="url(#sw-flare1)" stroke-width="2" opacity="0.3" filter="url(#sw-glow)"/>
  <line x1="400" y1="310" x2="400" y2="520" stroke="url(#sw-flare1)" stroke-width="2" opacity="0.3" transform="rotate(180,400,310)" filter="url(#sw-glow)"/>
  <line x1="400" y1="310" x2="610" y2="310" stroke="#ffc107" stroke-width="1.5" opacity="0.2" filter="url(#sw-glow)"/>
  <line x1="400" y1="310" x2="190" y2="310" stroke="#ffc107" stroke-width="1.5" opacity="0.2" filter="url(#sw-glow)"/>
  <line x1="400" y1="310" x2="548" y2="162" stroke="#ff9800" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="310" x2="252" y2="458" stroke="#ff9800" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="310" x2="548" y2="458" stroke="#ff9800" stroke-width="1" opacity="0.15"/>
  <line x1="400" y1="310" x2="252" y2="162" stroke="#ff9800" stroke-width="1" opacity="0.15"/>

  <!-- Energy waves emanating from center -->
  <circle cx="400" cy="310" r="60" fill="none" stroke="#ffc107" stroke-width="0.8" opacity="0.25"/>
  <circle cx="400" cy="310" r="90" fill="none" stroke="#ff9800" stroke-width="0.6" opacity="0.2"/>
  <circle cx="400" cy="310" r="120" fill="none" stroke="#e65100" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="310" r="150" fill="none" stroke="#bf360c" stroke-width="0.4" opacity="0.1"/>
  <circle cx="400" cy="310" r="180" fill="none" stroke="#bf360c" stroke-width="0.3" opacity="0.08"/>

  <!-- Particle streams — curved paths outward -->
  <path d="M400 310 Q430 250, 500 200 Q550 170, 620 140"
        fill="none" stroke="#ffc107" stroke-width="0.8" opacity="0.3"/>
  <path d="M400 310 Q370 250, 300 200 Q250 170, 180 140"
        fill="none" stroke="#ffc107" stroke-width="0.8" opacity="0.3"/>
  <path d="M400 310 Q440 350, 520 390 Q570 420, 650 450"
        fill="none" stroke="#ff9800" stroke-width="0.6" opacity="0.2"/>
  <path d="M400 310 Q360 350, 280 390 Q230 420, 150 450"
        fill="none" stroke="#ff9800" stroke-width="0.6" opacity="0.2"/>
  <path d="M400 310 Q450 290, 540 280 Q600 270, 680 260"
        fill="none" stroke="#e65100" stroke-width="0.5" opacity="0.15"/>
  <path d="M400 310 Q350 290, 260 280 Q200 270, 120 260"
        fill="none" stroke="#e65100" stroke-width="0.5" opacity="0.15"/>

  <!-- Small particles along streams -->
  <circle cx="500" cy="200" r="1.5" fill="#ffeb3b" opacity="0.5" filter="url(#sw-blur3)"/>
  <circle cx="300" cy="200" r="1.3" fill="#ffc107" opacity="0.45" filter="url(#sw-blur3)"/>
  <circle cx="520" cy="390" r="1.2" fill="#ff9800" opacity="0.35" filter="url(#sw-blur3)"/>
  <circle cx="280" cy="390" r="1.4" fill="#ffc107" opacity="0.35" filter="url(#sw-blur3)"/>
  <circle cx="540" cy="280" r="1" fill="#ffeb3b" opacity="0.3" filter="url(#sw-blur3)"/>
  <circle cx="260" cy="280" r="1.1" fill="#ffc107" opacity="0.3" filter="url(#sw-blur3)"/>

  <!-- Bright corona center -->
  <circle cx="400" cy="310" r="80" fill="url(#sw-corona)" filter="url(#sw-blur2)" opacity="0.6"/>
  <circle cx="400" cy="310" r="40" fill="url(#sw-corona)" filter="url(#sw-blur3)" opacity="0.7"/>
  <circle cx="400" cy="310" r="18" fill="#fff9c4" opacity="0.5" filter="url(#sw-brightglow)"/>
  <circle cx="400" cy="310" r="8" fill="#ffffff" opacity="0.8"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#ffffff" letter-spacing="4" opacity="0.9" filter="url(#sw-glow)">SOLAR WINDS</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffc107" letter-spacing="6" opacity="0.65">ENERGY ACTIVATION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#e65100" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#ffc107" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e65100" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>