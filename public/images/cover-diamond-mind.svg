<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0c1525"/>
      <stop offset="40%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#020510"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="40%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#4488cc" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#2060a0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="60%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#88bbee" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#4488cc" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#aaddff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="diamondGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#c0e0ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#6090c0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="diamondTop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#88bbee" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="diamondLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aaddff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4477aa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="diamondRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0e0ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3366aa" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="wideGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="brilliance">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="320" cy="300" rx="280" ry="200" fill="url(#nebula1)" filter="url(#wideGlow)"/>
  <ellipse cx="500" cy="380" rx="250" ry="180" fill="url(#nebula2)" filter="url(#wideGlow)"/>
  <ellipse cx="400" cy="280" rx="200" ry="150" fill="url(#nebula3)" filter="url(#softGlow)"/>

  <!-- Stars -->
  <circle cx="85" cy="60" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="715" cy="85" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="155" cy="155" r="1.5" fill="#c0e0ff" opacity="0.4"/>
  <circle cx="645" cy="125" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="375" cy="48" r="1" fill="white" opacity="0.45"/>
  <circle cx="545" cy="72" r="0.7" fill="#ddeeff" opacity="0.5"/>
  <circle cx="62" cy="345" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="738" cy="305" r="1.1" fill="white" opacity="0.35"/>
  <circle cx="32" cy="545" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="768" cy="495" r="1.3" fill="#c0e0ff" opacity="0.3"/>
  <circle cx="245" cy="745" r="0.7" fill="white" opacity="0.45"/>
  <circle cx="605" cy="755" r="1" fill="white" opacity="0.4"/>
  <circle cx="468" cy="775" r="0.6" fill="white" opacity="0.55"/>
  <circle cx="125" cy="445" r="0.8" fill="#ddeeff" opacity="0.3"/>
  <circle cx="685" cy="595" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="318" cy="175" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="505" cy="195" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="195" cy="615" r="0.7" fill="white" opacity="0.5"/>

  <!-- Diamond glow aura -->
  <circle cx="400" cy="310" r="120" fill="url(#diamondGlow)" filter="url(#wideGlow)" opacity="0.5"/>

  <!-- Diamond shape - faceted -->
  <!-- Crown (top part) -->
  <polygon points="400,180 340,280 460,280" fill="url(#diamondTop)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Table facet -->
  <polygon points="370,230 430,230 450,270 350,270" fill="#ffffff" fill-opacity="0.08" stroke="#c0e0ff" stroke-width="0.3" stroke-opacity="0.3"/>
  <!-- Left pavilion -->
  <polygon points="340,280 400,440 300,310" fill="url(#diamondLeft)" stroke="#88bbee" stroke-width="0.4" stroke-opacity="0.3"/>
  <!-- Right pavilion -->
  <polygon points="460,280 400,440 500,310" fill="url(#diamondRight)" stroke="#88bbee" stroke-width="0.4" stroke-opacity="0.3"/>
  <!-- Crown left facet -->
  <polygon points="400,180 340,280 300,260" fill="#aaddff" fill-opacity="0.06" stroke="#88bbee" stroke-width="0.3" stroke-opacity="0.2"/>
  <!-- Crown right facet -->
  <polygon points="400,180 460,280 500,260" fill="#c0e0ff" fill-opacity="0.08" stroke="#88bbee" stroke-width="0.3" stroke-opacity="0.2"/>
  <!-- Girdle -->
  <line x1="300" y1="280" x2="500" y2="280" stroke="#ffffff" stroke-width="0.6" opacity="0.3"/>
  <!-- Internal refraction lines -->
  <line x1="370" y1="280" x2="400" y2="440" stroke="#c0e0ff" stroke-width="0.3" opacity="0.15"/>
  <line x1="430" y1="280" x2="400" y2="440" stroke="#c0e0ff" stroke-width="0.3" opacity="0.15"/>
  <line x1="350" y1="300" x2="450" y2="350" stroke="#88bbee" stroke-width="0.2" opacity="0.1"/>
  <line x1="450" y1="300" x2="350" y2="350" stroke="#88bbee" stroke-width="0.2" opacity="0.1"/>
  <!-- Top point brilliance -->
  <circle cx="400" cy="180" r="5" fill="white" opacity="0.6" filter="url(#glow)"/>

  <!-- Brilliance lines radiating outward -->
  <line x1="400" y1="180" x2="400" y2="80" stroke="white" stroke-width="0.8" opacity="0.3" filter="url(#brilliance)"/>
  <line x1="400" y1="180" x2="300" y2="110" stroke="#c0e0ff" stroke-width="0.6" opacity="0.25" filter="url(#brilliance)"/>
  <line x1="400" y1="180" x2="500" y2="110" stroke="#c0e0ff" stroke-width="0.6" opacity="0.25" filter="url(#brilliance)"/>
  <line x1="400" y1="180" x2="250" y2="160" stroke="#88bbee" stroke-width="0.5" opacity="0.2" filter="url(#brilliance)"/>
  <line x1="400" y1="180" x2="550" y2="160" stroke="#88bbee" stroke-width="0.5" opacity="0.2" filter="url(#brilliance)"/>
  <line x1="300" y1="280" x2="180" y2="250" stroke="#aaddff" stroke-width="0.4" opacity="0.15"/>
  <line x1="500" y1="280" x2="620" y2="250" stroke="#aaddff" stroke-width="0.4" opacity="0.15"/>
  <line x1="400" y1="440" x2="350" y2="510" stroke="#88bbee" stroke-width="0.4" opacity="0.12"/>
  <line x1="400" y1="440" x2="450" y2="510" stroke="#88bbee" stroke-width="0.4" opacity="0.12"/>
  <line x1="400" y1="440" x2="400" y2="520" stroke="#aaddff" stroke-width="0.5" opacity="0.15"/>

  <!-- Sparkle points around diamond -->
  <circle cx="300" cy="260" r="2.5" fill="white" opacity="0.5" filter="url(#glow)"/>
  <circle cx="500" cy="260" r="2.5" fill="white" opacity="0.5" filter="url(#glow)"/>
  <circle cx="400" cy="440" r="3" fill="#c0e0ff" opacity="0.4" filter="url(#glow)"/>
  <circle cx="350" cy="230" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="450" cy="230" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="320" cy="320" r="1" fill="#aaddff" opacity="0.25"/>
  <circle cx="480" cy="320" r="1" fill="#aaddff" opacity="0.25"/>

  <!-- Geometric cut accent lines -->
  <line x1="280" y1="200" x2="310" y2="210" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>
  <line x1="520" y1="200" x2="490" y2="210" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>

  <!-- Title text -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="400" fill="white" letter-spacing="4" opacity="0.9">DIAMOND MIND</text>
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#88ccff" letter-spacing="7" opacity="0.65">MENTAL CLARITY</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#4488cc" stroke-width="0.6" opacity="0.3"/>
  <circle cx="400" cy="668" r="2" fill="#88bbee" opacity="0.4"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4488cc" letter-spacing="4" opacity="0.45">HEMISYNC.ORG</text>
</svg>