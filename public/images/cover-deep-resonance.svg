<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="50%" stop-color="#0d0a20"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#4338ca" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.4"/>
  <circle cx="680" cy="120" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="200" cy="200" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="600" cy="180" r="1" fill="white" opacity="0.35"/>
  <circle cx="350" cy="60" r="0.6" fill="white" opacity="0.45"/>
  <circle cx="500" cy="100" r="1.4" fill="white" opacity="0.25"/>
  <circle cx="100" cy="400" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="700" cy="350" r="1" fill="white" opacity="0.3"/>
  <circle cx="50" cy="600" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="750" cy="550" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="300" cy="700" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="550" cy="720" r="1" fill="white" opacity="0.3"/>
  <circle cx="450" cy="750" r="0.6" fill="white" opacity="0.45"/>
  <circle cx="150" cy="300" r="1" fill="white" opacity="0.25"/>
  <circle cx="650" cy="650" r="0.8" fill="white" opacity="0.4"/>

  <!-- Large glow orbs -->
  <circle cx="400" cy="380" r="200" fill="url(#orb1)" filter="url(#softglow)"/>
  <circle cx="350" cy="350" r="150" fill="url(#orb2)" filter="url(#softglow)"/>
  <circle cx="450" cy="400" r="120" fill="url(#orb3)" filter="url(#softglow)"/>

  <!-- Concentric rings -->
  <circle cx="400" cy="380" r="80" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="380" r="120" fill="none" stroke="#818cf8" stroke-width="0.4" opacity="0.2"/>
  <circle cx="400" cy="380" r="160" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.15"/>
  <circle cx="400" cy="380" r="200" fill="none" stroke="#c4b5fd" stroke-width="0.3" opacity="0.1"/>
  <circle cx="400" cy="380" r="240" fill="none" stroke="#ddd6fe" stroke-width="0.2" opacity="0.08"/>

  <!-- Central bright core -->
  <circle cx="400" cy="380" r="40" fill="url(#orb1)" filter="url(#glow)"/>
  <circle cx="400" cy="380" r="15" fill="#a5b4fc" opacity="0.6" filter="url(#glow)"/>
  <circle cx="400" cy="380" r="5" fill="white" opacity="0.8"/>

  <!-- Sound waves -->
  <path d="M100 380 Q200 340, 300 380 Q350 400, 400 380 Q450 360, 500 380 Q600 420, 700 380"
        fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <path d="M100 380 Q200 360, 300 380 Q350 390, 400 380 Q450 370, 500 380 Q600 400, 700 380"
        fill="none" stroke="url(#wave)" stroke-width="1" opacity="0.6"/>
  <path d="M150 400 Q250 370, 350 400 Q400 415, 450 400 Q500 385, 550 400 Q650 430, 700 400"
        fill="none" stroke="url(#wave)" stroke-width="0.8" opacity="0.25"/>
  <path d="M150 360 Q250 340, 350 360 Q400 370, 450 360 Q500 350, 550 360 Q650 380, 700 360"
        fill="none" stroke="url(#wave)" stroke-width="0.8" opacity="0.25"/>

  <!-- Sacred geometry - subtle hexagon -->
  <polygon points="400,280 503,330 503,430 400,480 297,430 297,330"
           fill="none" stroke="#6366f1" stroke-width="0.4" opacity="0.15"/>
  <polygon points="400,300 485,340 485,420 400,460 315,420 315,340"
           fill="none" stroke="#818cf8" stroke-width="0.3" opacity="0.12"/>

  <!-- Title text -->
  <text x="400" y="620" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="400" fill="white" letter-spacing="3" opacity="0.9">DEEP RESONANCE</text>
  <text x="400" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a5b4fc" letter-spacing="6" opacity="0.7">GUIDED MEDITATION</text>

  <!-- Bottom accent line -->
  <line x1="320" y1="690" x2="480" y2="690" stroke="url(#wave)" stroke-width="1" opacity="0.4"/>

  <!-- HemiSync.org branding -->
  <text x="400" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#818cf8" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>
