<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="lt-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="40%" stop-color="#0f0f2a"/>
      <stop offset="100%" stop-color="#060614"/>
    </radialGradient>
    <!-- Moon glow -->
    <radialGradient id="lt-moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8d8ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#6678aa" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a1a3e" stop-opacity="0"/>
    </radialGradient>
    <!-- Tide glow -->
    <radialGradient id="lt-tideGlow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#3344aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a1e" stop-opacity="0"/>
    </radialGradient>
    <!-- Light ray gradient -->
    <linearGradient id="lt-ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aabbee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#aabbee" stop-opacity="0"/>
    </linearGradient>
    <filter id="lt-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="lt-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="lt-blur3">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="lt-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#lt-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="320" cy="250" rx="250" ry="200" fill="#2233aa" opacity="0.08" filter="url(#lt-blur1)"/>
  <ellipse cx="550" cy="180" rx="180" ry="140" fill="#4455cc" opacity="0.06" filter="url(#lt-blur1)"/>
  <ellipse cx="400" cy="500" rx="300" ry="100" fill="#2244bb" opacity="0.1" filter="url(#lt-blur1)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="250" cy="45" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="380" cy="90" r="1.5" fill="#ccdeff" opacity="0.9"/>
  <circle cx="520" cy="60" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="650" cy="100" r="1.3" fill="#ddeeff" opacity="0.8"/>
  <circle cx="710" cy="55" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="80" cy="200" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="190" cy="300" r="0.7" fill="#ccdeff" opacity="0.7"/>
  <circle cx="700" cy="220" r="1.4" fill="#ffffff" opacity="0.8"/>
  <circle cx="600" cy="310" r="0.9" fill="#ddeeff" opacity="0.6"/>
  <circle cx="50" cy="400" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="750" cy="380" r="1" fill="#ccdeff" opacity="0.7"/>
  <circle cx="150" cy="150" r="1.6" fill="#ffffff" opacity="0.9"/>
  <circle cx="450" cy="130" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="330" cy="170" r="1.1" fill="#ddeeff" opacity="0.7"/>
  <circle cx="580" cy="170" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="680" cy="290" r="1.3" fill="#ccdeff" opacity="0.8"/>
  <circle cx="100" cy="350" r="0.9" fill="#ffffff" opacity="0.6"/>

  <!-- Moon glow aura -->
  <ellipse cx="400" cy="240" rx="180" ry="180" fill="url(#lt-moonGlow)" filter="url(#lt-blur2)"/>

  <!-- Crescent Moon -->
  <circle cx="400" cy="230" r="80" fill="#d0daf0" opacity="0.95"/>
  <circle cx="430" cy="210" r="70" fill="#0f0f2a"/>
  <!-- Moon surface details -->
  <circle cx="375" cy="215" r="8" fill="#bcc8e0" opacity="0.4"/>
  <circle cx="390" cy="255" r="5" fill="#bcc8e0" opacity="0.3"/>
  <circle cx="365" cy="240" r="12" fill="#b8c5dd" opacity="0.25"/>
  <circle cx="400" cy="270" r="6" fill="#bcc8e0" opacity="0.2"/>

  <!-- Descending light rays -->
  <polygon points="370,310 365,520 375,520" fill="url(#lt-ray)" opacity="0.4"/>
  <polygon points="400,310 393,520 407,520" fill="url(#lt-ray)" opacity="0.5"/>
  <polygon points="430,310 422,520 438,520" fill="url(#lt-ray)" opacity="0.35"/>
  <polygon points="350,310 340,500 360,500" fill="url(#lt-ray)" opacity="0.25"/>
  <polygon points="450,310 440,490 460,490" fill="url(#lt-ray)" opacity="0.2"/>
  <polygon points="320,305 308,470 332,470" fill="url(#lt-ray)" opacity="0.15"/>
  <polygon points="470,305 458,460 482,460" fill="url(#lt-ray)" opacity="0.12"/>

  <!-- Tide waves -->
  <path d="M100,480 Q200,465 300,480 Q400,495 500,480 Q600,465 700,480" stroke="#4466bb" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M80,500 Q180,482 300,500 Q420,518 520,500 Q620,482 720,500" stroke="#5577cc" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M60,520 Q180,500 320,520 Q460,540 560,520 Q660,500 740,520" stroke="#4466bb" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M50,540 Q170,525 310,540 Q450,555 570,540 Q680,525 750,540" stroke="#3355aa" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- Tide glow at bottom -->
  <ellipse cx="400" cy="510" rx="350" ry="80" fill="url(#lt-tideGlow)" filter="url(#lt-blur2)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#ffffff" letter-spacing="3" filter="url(#lt-glow)">LUNAR TIDE</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7788cc" letter-spacing="6">SLEEP IMMERSION</text>

  <!-- Decorative line -->
  <line x1="310" y1="668" x2="490" y2="668" stroke="#4455aa" stroke-width="0.5" opacity="0.6"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#556699" letter-spacing="4">HEMISYNC.ORG</text>
</svg>