<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="75%">
      <stop offset="0%" stop-color="#041830"/>
      <stop offset="40%" stop-color="#021020"/>
      <stop offset="100%" stop-color="#010810"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a4080" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#062860" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="60%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#0088aa" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#006080" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#00aacc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="depthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a3060" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#062040" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#010818" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ccee" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0088bb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="bioGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00aacc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="wideGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="bioFilter">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Nebula clouds (underwater light) -->
  <ellipse cx="300" cy="350" rx="300" ry="220" fill="url(#nebula1)" filter="url(#wideGlow)"/>
  <ellipse cx="520" cy="300" rx="260" ry="190" fill="url(#nebula2)" filter="url(#wideGlow)"/>
  <ellipse cx="400" cy="400" rx="220" ry="160" fill="url(#nebula3)" filter="url(#softGlow)"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="720" cy="60" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="150" cy="100" r="1.5" fill="#80ddff" opacity="0.4"/>
  <circle cx="650" cy="90" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="380" cy="30" r="1" fill="white" opacity="0.45"/>
  <circle cx="540" cy="50" r="0.7" fill="#a0eeff" opacity="0.5"/>
  <circle cx="60" cy="200" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="740" cy="180" r="1.1" fill="white" opacity="0.35"/>
  <circle cx="30" cy="400" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="770" cy="350" r="1.3" fill="#80ddff" opacity="0.25"/>
  <circle cx="250" cy="750" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="600" cy="760" r="1" fill="white" opacity="0.25"/>
  <circle cx="460" cy="780" r="0.6" fill="white" opacity="0.35"/>
  <circle cx="130" cy="300" r="0.8" fill="#a0eeff" opacity="0.3"/>
  <circle cx="680" cy="460" r="0.9" fill="white" opacity="0.25"/>
  <circle cx="310" cy="120" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="140" r="1.1" fill="white" opacity="0.3"/>

  <!-- Large wave curve -->
  <path d="M0,220 Q150,160 300,240 Q450,320 600,200 Q700,140 800,180" fill="none" stroke="#00bbdd" stroke-width="3" opacity="0.4" filter="url(#glow)"/>
  <path d="M0,220 Q150,160 300,240 Q450,320 600,200 Q700,140 800,180 L800,280 Q700,200 600,260 Q450,380 300,300 Q150,220 0,280 Z" fill="url(#waveGrad)" opacity="0.3"/>
  <!-- Secondary wave -->
  <path d="M0,260 Q200,200 350,280 Q500,350 650,240 Q750,180 800,220" fill="none" stroke="#0099bb" stroke-width="2" opacity="0.25"/>
  <!-- Tertiary wave -->
  <path d="M0,300 Q180,250 380,310 Q520,360 680,270 Q760,230 800,260" fill="none" stroke="#007799" stroke-width="1.5" opacity="0.15"/>

  <!-- Underwater depth gradient -->
  <rect x="0" y="280" width="800" height="520" fill="url(#depthGrad)"/>

  <!-- Deep ocean pressure lines -->
  <line x1="0" y1="380" x2="800" y2="380" stroke="#0a4060" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="#083050" stroke-width="0.4" opacity="0.12"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#062040" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#041830" stroke-width="0.3" opacity="0.08"/>

  <!-- Bioluminescent dots -->
  <circle cx="150" cy="350" r="3" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.6"/>
  <circle cx="300" cy="400" r="2.5" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.5"/>
  <circle cx="480" cy="370" r="2" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.55"/>
  <circle cx="620" cy="420" r="3.5" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.45"/>
  <circle cx="100" cy="450" r="2" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.4"/>
  <circle cx="380" cy="480" r="1.5" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.35"/>
  <circle cx="550" cy="500" r="2.5" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.3"/>
  <circle cx="700" cy="380" r="2" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.5"/>
  <circle cx="230" cy="500" r="1.8" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.35"/>
  <circle cx="680" cy="470" r="1.5" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.3"/>
  <circle cx="420" cy="440" r="2" fill="url(#bioGlow)" filter="url(#bioFilter)" opacity="0.4"/>
  <circle cx="200" cy="420" r="1" fill="#00ffff" opacity="0.3"/>
  <circle cx="350" cy="460" r="0.8" fill="#00ffff" opacity="0.25"/>
  <circle cx="500" cy="450" r="1.2" fill="#00ffff" opacity="0.3"/>
  <circle cx="600" cy="490" r="0.7" fill="#00ffff" opacity="0.2"/>
  <circle cx="750" cy="440" r="1" fill="#00ffff" opacity="0.25"/>

  <!-- Underwater current lines -->
  <path d="M50,360 Q200,340 350,370 Q500,400 650,360" fill="none" stroke="#00aacc" stroke-width="0.5" opacity="0.12"/>
  <path d="M100,420 Q250,400 400,430 Q550,460 700,420" fill="none" stroke="#0088aa" stroke-width="0.4" opacity="0.1"/>

  <!-- Title text -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="400" fill="white" letter-spacing="4" opacity="0.9">TIDAL DREAM</text>
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#60ddff" letter-spacing="7" opacity="0.65">OCEAN SLEEP</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#0088aa" stroke-width="0.6" opacity="0.3"/>
  <circle cx="400" cy="668" r="2" fill="#00bbdd" opacity="0.4"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0088aa" letter-spacing="4" opacity="0.45">HEMISYNC.ORG</text>
</svg>