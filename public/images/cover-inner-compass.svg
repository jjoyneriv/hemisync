<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="ic-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a2a2e"/>
      <stop offset="45%" stop-color="#061a1e"/>
      <stop offset="100%" stop-color="#030e10"/>
    </radialGradient>
    <radialGradient id="ic-coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#00aaaa" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#003333" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ic-centerDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00ffdd"/>
      <stop offset="100%" stop-color="#00aaaa" stop-opacity="0"/>
    </radialGradient>
    <filter id="ic-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="ic-blur2">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="ic-blur3">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="ic-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#ic-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="300" cy="300" rx="200" ry="200" fill="#0088aa" opacity="0.06" filter="url(#ic-blur1)"/>
  <ellipse cx="500" cy="350" rx="250" ry="180" fill="#00ccaa" opacity="0.04" filter="url(#ic-blur1)"/>
  <ellipse cx="400" cy="280" rx="150" ry="150" fill="#00ddcc" opacity="0.08" filter="url(#ic-blur1)"/>

  <!-- Stars -->
  <circle cx="95" cy="65" r="1.1" fill="#ffffff" opacity="0.7"/>
  <circle cx="230" cy="40" r="0.9" fill="#aaffee" opacity="0.6"/>
  <circle cx="355" cy="75" r="1.4" fill="#ffffff" opacity="0.8"/>
  <circle cx="510" cy="50" r="1" fill="#ccffee" opacity="0.7"/>
  <circle cx="660" cy="85" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="720" cy="40" r="0.8" fill="#aaffee" opacity="0.5"/>
  <circle cx="60" cy="190" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="740" cy="200" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="55" cy="380" r="0.9" fill="#ccffee" opacity="0.5"/>
  <circle cx="745" cy="400" r="1.1" fill="#ffffff" opacity="0.7"/>
  <circle cx="130" cy="140" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="680" cy="150" r="0.7" fill="#aaffee" opacity="0.6"/>
  <circle cx="170" cy="450" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="630" cy="460" r="1.2" fill="#ccffee" opacity="0.6"/>
  <circle cx="480" cy="120" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="290" cy="480" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="550" cy="490" r="0.9" fill="#aaffee" opacity="0.6"/>
  <circle cx="200" cy="110" r="1.3" fill="#ffffff" opacity="0.8"/>

  <!-- Core glow -->
  <ellipse cx="400" cy="310" rx="200" ry="200" fill="url(#ic-coreGlow)" filter="url(#ic-blur2)"/>

  <!-- Concentric focus rings -->
  <circle cx="400" cy="310" r="160" stroke="#00ccaa" stroke-width="0.4" fill="none" opacity="0.15"/>
  <circle cx="400" cy="310" r="130" stroke="#00ddbb" stroke-width="0.5" fill="none" opacity="0.2"/>
  <circle cx="400" cy="310" r="100" stroke="#00eedd" stroke-width="0.6" fill="none" opacity="0.25"/>
  <circle cx="400" cy="310" r="70" stroke="#00ffee" stroke-width="0.7" fill="none" opacity="0.3"/>
  <circle cx="400" cy="310" r="40" stroke="#44ffee" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Directional lines (crosshair) -->
  <line x1="400" y1="100" x2="400" y2="240" stroke="#00ddcc" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="380" x2="400" y2="520" stroke="#00ddcc" stroke-width="0.8" opacity="0.3"/>
  <line x1="220" y1="310" x2="330" y2="310" stroke="#00ddcc" stroke-width="0.8" opacity="0.3"/>
  <line x1="470" y1="310" x2="580" y2="310" stroke="#00ddcc" stroke-width="0.8" opacity="0.3"/>

  <!-- Compass rose - North -->
  <polygon points="400,160 390,260 400,240 410,260" fill="#00eedd" opacity="0.5"/>
  <!-- South -->
  <polygon points="400,460 390,360 400,380 410,360" fill="#00bbaa" opacity="0.35"/>
  <!-- East -->
  <polygon points="540,310 440,300 460,310 440,320" fill="#00bbaa" opacity="0.35"/>
  <!-- West -->
  <polygon points="260,310 360,300 340,310 360,320" fill="#00bbaa" opacity="0.35"/>

  <!-- Diagonal compass points -->
  <line x1="310" y1="220" x2="350" y2="260" stroke="#00ccbb" stroke-width="0.6" opacity="0.25"/>
  <line x1="490" y1="220" x2="450" y2="260" stroke="#00ccbb" stroke-width="0.6" opacity="0.25"/>
  <line x1="310" y1="400" x2="350" y2="360" stroke="#00ccbb" stroke-width="0.6" opacity="0.25"/>
  <line x1="490" y1="400" x2="450" y2="360" stroke="#00ccbb" stroke-width="0.6" opacity="0.25"/>

  <!-- Tick marks on rings -->
  <line x1="400" y1="150" x2="400" y2="145" stroke="#00ffdd" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="470" x2="400" y2="475" stroke="#00ffdd" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="310" x2="235" y2="310" stroke="#00ffdd" stroke-width="1" opacity="0.5"/>
  <line x1="560" y1="310" x2="565" y2="310" stroke="#00ffdd" stroke-width="1" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="400" cy="310" r="6" fill="url(#ic-centerDot)" filter="url(#ic-blur3)"/>
  <circle cx="400" cy="310" r="2" fill="#ffffff"/>

  <!-- Small degree marks around outer ring -->
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(30,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(60,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(120,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(150,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(210,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(240,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(300,400,310)"/>
  <line x1="400" y1="148" x2="400" y2="155" stroke="#00ddcc" stroke-width="0.5" opacity="0.4" transform="rotate(330,400,310)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#ffffff" letter-spacing="3" filter="url(#ic-glow)">INNER COMPASS</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00ccaa" letter-spacing="6">FOCUS &amp; CONCENTRATION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#00aa88" stroke-width="0.5" opacity="0.6"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#448877" letter-spacing="4">HEMISYNC.ORG</text>
</svg>