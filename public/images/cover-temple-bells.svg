<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="tb-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#2a1f0a"/>
      <stop offset="45%" stop-color="#181205"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <radialGradient id="tb-nebula1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffb300" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ff8f00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tb-nebula2" cx="40%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ffa000" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#e65100" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tb-nebula3" cx="55%" cy="38%" r="35%">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tb-bellGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe082" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ffb300" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ff8f00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tb-goldGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffb300" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff8f00" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="tb-rippleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb300" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffc107" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffd54f" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#ffc107" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
    </linearGradient>
    <filter id="tb-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="tb-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="tb-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="tb-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#tb-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="400" cy="320" rx="300" ry="220" fill="url(#tb-nebula1)" filter="url(#tb-blur1)"/>
  <ellipse cx="350" cy="380" rx="250" ry="200" fill="url(#tb-nebula2)" filter="url(#tb-blur1)"/>
  <ellipse cx="450" cy="300" rx="200" ry="160" fill="url(#tb-nebula3)" filter="url(#tb-blur1)"/>

  <!-- Stars -->
  <circle cx="95" cy="60" r="1.2" fill="#fff8e1" opacity="0.6"/>
  <circle cx="220" cy="45" r="0.8" fill="#ffe082" opacity="0.5"/>
  <circle cx="380" cy="70" r="1.4" fill="#ffffff" opacity="0.65"/>
  <circle cx="525" cy="55" r="1" fill="#fff8e1" opacity="0.55"/>
  <circle cx="655" cy="85" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="715" cy="35" r="0.9" fill="#ffe082" opacity="0.4"/>
  <circle cx="70" cy="210" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="740" cy="240" r="1" fill="#fff8e1" opacity="0.45"/>
  <circle cx="50" cy="370" r="0.9" fill="#ffe082" opacity="0.4"/>
  <circle cx="760" cy="360" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="135" cy="145" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="670" cy="150" r="0.7" fill="#fff8e1" opacity="0.5"/>
  <circle cx="170" cy="450" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="630" cy="460" r="1.2" fill="#ffe082" opacity="0.45"/>
  <circle cx="475" cy="100" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="315" cy="490" r="1.1" fill="#fff8e1" opacity="0.35"/>
  <circle cx="560" cy="740" r="0.7" fill="#ffffff" opacity="0.3"/>

  <!-- Temple roof lines — subtle pagoda shape -->
  <path d="M300 200 L400 150 L500 200" fill="none" stroke="#ff8f00" stroke-width="0.8" opacity="0.2"/>
  <path d="M280 215 L400 160 L520 215" fill="none" stroke="#ffb300" stroke-width="0.6" opacity="0.15"/>
  <path d="M320 210 L400 175 L480 210" fill="none" stroke="#ffc107" stroke-width="0.5" opacity="0.12"/>

  <!-- Central bell shape — main bell -->
  <path d="M360 280 Q360 250, 370 235 Q385 220, 400 218 Q415 220, 430 235 Q440 250, 440 280 Q440 330, 450 370 L350 370 Q360 330, 360 280Z"
        fill="none" stroke="#ffd54f" stroke-width="1.2" opacity="0.35"/>
  <path d="M365 285 Q365 258, 374 245 Q387 232, 400 230 Q413 232, 426 245 Q435 258, 435 285 Q435 328, 443 362 L357 362 Q365 328, 365 285Z"
        fill="#ffd54f" opacity="0.05"/>

  <!-- Bell clapper -->
  <line x1="400" y1="300" x2="400" y2="365" stroke="#ffe082" stroke-width="0.6" opacity="0.3"/>
  <circle cx="400" cy="368" r="4" fill="#ffd54f" opacity="0.25"/>

  <!-- Bell top knob -->
  <circle cx="400" cy="215" r="5" fill="#ffe082" opacity="0.2"/>

  <!-- Left smaller bell -->
  <path d="M230 320 Q230 298, 237 288 Q247 278, 255 277 Q263 278, 273 288 Q280 298, 280 320 Q280 348, 286 370 L224 370 Q230 348, 230 320Z"
        fill="none" stroke="#ffb300" stroke-width="0.8" opacity="0.2"/>

  <!-- Right smaller bell -->
  <path d="M520 320 Q520 298, 527 288 Q537 278, 545 277 Q553 278, 563 288 Q570 298, 570 320 Q570 348, 576 370 L514 370 Q520 348, 520 320Z"
        fill="none" stroke="#ffb300" stroke-width="0.8" opacity="0.2"/>

  <!-- Sound ripples from main bell -->
  <ellipse cx="400" cy="340" rx="70" ry="25" fill="none" stroke="#ffc107" stroke-width="0.6" opacity="0.2"/>
  <ellipse cx="400" cy="340" rx="100" ry="35" fill="none" stroke="#ffb300" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="400" cy="340" rx="130" ry="45" fill="none" stroke="#ff8f00" stroke-width="0.4" opacity="0.1"/>
  <ellipse cx="400" cy="340" rx="160" ry="55" fill="none" stroke="#e65100" stroke-width="0.3" opacity="0.08"/>
  <ellipse cx="400" cy="340" rx="190" ry="65" fill="none" stroke="#bf360c" stroke-width="0.25" opacity="0.06"/>

  <!-- Sacred geometry — subtle mandala pattern -->
  <circle cx="400" cy="340" r="50" fill="none" stroke="#ffd54f" stroke-width="0.4" opacity="0.15"/>
  <polygon points="400,290 443,315 443,365 400,390 357,365 357,315"
           fill="none" stroke="#ffb300" stroke-width="0.3" opacity="0.12"/>
  <polygon points="400,300 433,320 433,360 400,380 367,360 367,320"
           fill="none" stroke="#ffc107" stroke-width="0.25" opacity="0.1"/>

  <!-- Bell glow -->
  <circle cx="400" cy="310" r="50" fill="url(#tb-bellGlow)" filter="url(#tb-blur2)" opacity="0.4"/>
  <circle cx="400" cy="310" r="20" fill="url(#tb-bellGlow)" filter="url(#tb-blur3)" opacity="0.4"/>

  <!-- Floating golden particles -->
  <circle cx="300" cy="280" r="1.5" fill="#ffd54f" opacity="0.4" filter="url(#tb-blur3)"/>
  <circle cx="500" cy="300" r="1.2" fill="#ffb300" opacity="0.35" filter="url(#tb-blur3)"/>
  <circle cx="340" cy="420" r="1.8" fill="#ffe082" opacity="0.3" filter="url(#tb-blur3)"/>
  <circle cx="460" cy="410" r="1" fill="#ffd54f" opacity="0.3" filter="url(#tb-blur3)"/>
  <circle cx="270" cy="360" r="1.3" fill="#ffb300" opacity="0.25" filter="url(#tb-blur3)"/>
  <circle cx="530" cy="350" r="1.4" fill="#ffe082" opacity="0.3" filter="url(#tb-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#ffffff" letter-spacing="4" opacity="0.9" filter="url(#tb-glow)">TEMPLE BELLS</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffc107" letter-spacing="5" opacity="0.65">MINDFULNESS PRACTICE</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#ff8f00" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#ffc107" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff8f00" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>