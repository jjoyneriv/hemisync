<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2a1808"/>
      <stop offset="40%" stop-color="#180e05"/>
      <stop offset="100%" stop-color="#0a0503"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#cc6620" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#884410" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="55%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#dd6688" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#994466" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="38%" r="35%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd88" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#ffaa44" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ee7722" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#cc4400" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ffee88" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#ffcc44" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffaa22" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="skyBand1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dd4488" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cc6620" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="skyBand2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8844" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffaa44" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.15"/>
      <stop offset="30%" stop-color="#cc6620" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#441808" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc66" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ff8833" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="wideGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="sunFilter">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Nebula clouds (sunset atmosphere) -->
  <ellipse cx="350" cy="300" rx="300" ry="200" fill="url(#nebula1)" filter="url(#wideGlow)"/>
  <ellipse cx="480" cy="320" rx="260" ry="180" fill="url(#nebula2)" filter="url(#wideGlow)"/>
  <ellipse cx="400" cy="280" rx="220" ry="160" fill="url(#nebula3)" filter="url(#softGlow)"/>

  <!-- Stars (faint, golden hour sky) -->
  <circle cx="80" cy="40" r="1.2" fill="#ffddaa" opacity="0.35"/>
  <circle cx="720" cy="55" r="0.8" fill="#ffccaa" opacity="0.4"/>
  <circle cx="150" cy="100" r="1.5" fill="#ffddcc" opacity="0.3"/>
  <circle cx="650" cy="80" r="0.6" fill="#ffddaa" opacity="0.45"/>
  <circle cx="370" cy="30" r="1" fill="#ffeecc" opacity="0.3"/>
  <circle cx="540" cy="50" r="0.7" fill="#ffccaa" opacity="0.35"/>
  <circle cx="55" cy="200" r="0.9" fill="#ffddaa" opacity="0.3"/>
  <circle cx="745" cy="170" r="1.1" fill="#ffccaa" opacity="0.25"/>
  <circle cx="30" cy="350" r="0.8" fill="#ffddaa" opacity="0.2"/>
  <circle cx="770" cy="320" r="1.3" fill="#ffccaa" opacity="0.2"/>
  <circle cx="240" cy="740" r="0.7" fill="#ffddaa" opacity="0.25"/>
  <circle cx="600" cy="750" r="1" fill="#ffccaa" opacity="0.2"/>
  <circle cx="460" cy="770" r="0.6" fill="#ffddaa" opacity="0.3"/>
  <circle cx="120" cy="300" r="0.8" fill="#ffeecc" opacity="0.2"/>
  <circle cx="680" cy="400" r="0.9" fill="#ffccaa" opacity="0.18"/>
  <circle cx="300" cy="70" r="0.5" fill="#ffddaa" opacity="0.4"/>
  <circle cx="500" cy="100" r="1.1" fill="#ffccaa" opacity="0.25"/>

  <!-- Horizontal color bands (sky) -->
  <rect x="0" y="120" width="800" height="40" fill="url(#skyBand1)" opacity="0.5"/>
  <rect x="0" y="170" width="800" height="35" fill="#dd5544" fill-opacity="0.06"/>
  <rect x="0" y="210" width="800" height="40" fill="url(#skyBand2)" opacity="0.5"/>
  <rect x="0" y="260" width="800" height="30" fill="#ff8844" fill-opacity="0.05"/>
  <rect x="0" y="295" width="800" height="35" fill="#ffaa44" fill-opacity="0.04"/>

  <!-- Large setting sun -->
  <circle cx="400" cy="340" r="140" fill="url(#sunGlow)" filter="url(#sunFilter)" opacity="0.6"/>
  <circle cx="400" cy="340" r="80" fill="url(#sunGlow)" filter="url(#softGlow)" opacity="0.5"/>
  <circle cx="400" cy="340" r="50" fill="url(#sunCore)" filter="url(#glow)" opacity="0.4"/>
  <circle cx="400" cy="340" r="30" fill="#ffee88" opacity="0.2" filter="url(#glow)"/>
  <circle cx="400" cy="340" r="15" fill="#ffffff" opacity="0.15"/>

  <!-- Horizon line -->
  <line x1="0" y1="380" x2="800" y2="380" stroke="#ffaa44" stroke-width="1.5" opacity="0.15"/>
  <rect x="0" y="375" width="800" height="10" fill="#ffcc66" fill-opacity="0.05" filter="url(#softGlow)"/>

  <!-- Water area below horizon -->
  <rect x="0" y="380" width="800" height="220" fill="url(#waterGrad)"/>

  <!-- Sun reflection on water -->
  <rect x="340" y="380" width="120" height="180" fill="url(#reflectionGrad)" opacity="0.4"/>
  <!-- Shimmer lines on water reflection -->
  <line x1="360" y1="395" x2="440" y2="395" stroke="#ffcc66" stroke-width="1.5" opacity="0.2"/>
  <line x1="370" y1="415" x2="430" y2="415" stroke="#ffaa44" stroke-width="1.2" opacity="0.18"/>
  <line x1="375" y1="435" x2="425" y2="435" stroke="#ff8833" stroke-width="1" opacity="0.15"/>
  <line x1="380" y1="455" x2="420" y2="455" stroke="#ff8833" stroke-width="0.8" opacity="0.12"/>
  <line x1="385" y1="475" x2="415" y2="475" stroke="#cc6620" stroke-width="0.6" opacity="0.1"/>
  <line x1="388" y1="495" x2="412" y2="495" stroke="#cc6620" stroke-width="0.5" opacity="0.08"/>
  <line x1="392" y1="515" x2="408" y2="515" stroke="#aa5518" stroke-width="0.4" opacity="0.06"/>

  <!-- Water ripple lines -->
  <line x1="0" y1="400" x2="320" y2="400" stroke="#cc6620" stroke-width="0.4" opacity="0.08"/>
  <line x1="480" y1="400" x2="800" y2="400" stroke="#cc6620" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="430" x2="350" y2="430" stroke="#aa5518" stroke-width="0.3" opacity="0.06"/>
  <line x1="450" y1="430" x2="800" y2="430" stroke="#aa5518" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="460" x2="360" y2="460" stroke="#884410" stroke-width="0.3" opacity="0.05"/>
  <line x1="440" y1="460" x2="800" y2="460" stroke="#884410" stroke-width="0.3" opacity="0.05"/>

  <!-- Warm golden atmosphere particles -->
  <circle cx="300" cy="300" r="1.5" fill="#ffcc66" opacity="0.15"/>
  <circle cx="500" cy="280" r="1.2" fill="#ffaa44" opacity="0.12"/>
  <circle cx="250" cy="340" r="1" fill="#ff8833" opacity="0.1"/>
  <circle cx="550" cy="350" r="1.3" fill="#ffcc66" opacity="0.12"/>
  <circle cx="350" cy="250" r="0.8" fill="#ffddaa" opacity="0.1"/>
  <circle cx="450" cy="260" r="1" fill="#ffaa44" opacity="0.08"/>

  <!-- Scattered clouds silhouettes -->
  <ellipse cx="200" cy="280" rx="60" ry="12" fill="#cc5520" fill-opacity="0.06"/>
  <ellipse cx="600" cy="260" rx="50" ry="10" fill="#cc5520" fill-opacity="0.05"/>
  <ellipse cx="150" cy="310" rx="40" ry="8" fill="#aa4418" fill-opacity="0.04"/>
  <ellipse cx="650" cy="300" rx="45" ry="9" fill="#aa4418" fill-opacity="0.04"/>

  <!-- Title text -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="400" fill="white" letter-spacing="4" opacity="0.9">GOLDEN HOUR</text>
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffbb66" letter-spacing="7" opacity="0.65">SUNSET REFLECTION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#cc6620" stroke-width="0.6" opacity="0.3"/>
  <circle cx="400" cy="668" r="2" fill="#ffaa44" opacity="0.4"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#cc6620" letter-spacing="4" opacity="0.45">HEMISYNC.ORG</text>
</svg>