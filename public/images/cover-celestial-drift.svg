<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="cbg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="40%" stop-color="#070b2a"/>
      <stop offset="100%" stop-color="#020318"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="35%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#312e81" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="65%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#5b21b6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#4338ca" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="40%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="cg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="csg">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="csg2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#cbg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="300" cy="320" rx="280" ry="200" fill="url(#nebula1)" filter="url(#csg2)"/>
  <ellipse cx="520" cy="420" rx="250" ry="180" fill="url(#nebula2)" filter="url(#csg2)"/>
  <ellipse cx="400" cy="300" rx="180" ry="140" fill="url(#nebula3)" filter="url(#csg)"/>

  <!-- Stars field -->
  <circle cx="80" cy="50" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="720" cy="80" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="150" cy="150" r="1.5" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="650" cy="130" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="380" cy="40" r="1" fill="white" opacity="0.45"/>
  <circle cx="550" cy="70" r="0.7" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="60" cy="350" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="740" cy="300" r="1.1" fill="white" opacity="0.35"/>
  <circle cx="30" cy="550" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="770" cy="500" r="1.3" fill="#a5b4fc" opacity="0.3"/>
  <circle cx="250" cy="750" r="0.7" fill="white" opacity="0.45"/>
  <circle cx="600" cy="760" r="1" fill="white" opacity="0.4"/>
  <circle cx="470" cy="780" r="0.6" fill="white" opacity="0.55"/>
  <circle cx="130" cy="450" r="0.8" fill="#ddd6fe" opacity="0.3"/>
  <circle cx="680" cy="600" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="320" cy="180" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="200" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="200" cy="620" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="580" cy="680" r="0.6" fill="white" opacity="0.45"/>
  <circle cx="420" cy="140" r="0.8" fill="#c4b5fd" opacity="0.35"/>

  <!-- Aurora streaks -->
  <path d="M50 300 Q200 250, 400 320 Q600 390, 750 280" fill="none" stroke="url(#aurora1)" stroke-width="40" opacity="0.3" filter="url(#csg)"/>
  <path d="M100 380 Q300 310, 500 370 Q650 410, 780 340" fill="none" stroke="url(#aurora2)" stroke-width="30" opacity="0.25" filter="url(#csg)"/>

  <!-- Central celestial body -->
  <circle cx="400" cy="340" r="80" fill="url(#coreGlow)" filter="url(#csg)"/>
  <circle cx="400" cy="340" r="35" fill="url(#coreGlow)" filter="url(#cg)"/>
  <circle cx="400" cy="340" r="12" fill="#c7d2fe" opacity="0.7" filter="url(#cg)"/>
  <circle cx="400" cy="340" r="4" fill="white" opacity="0.9"/>

  <!-- Orbital paths -->
  <ellipse cx="400" cy="340" rx="120" ry="45" fill="none" stroke="#6366f1" stroke-width="0.4" opacity="0.2" transform="rotate(-15 400 340)"/>
  <ellipse cx="400" cy="340" rx="180" ry="60" fill="none" stroke="#818cf8" stroke-width="0.3" opacity="0.15" transform="rotate(10 400 340)"/>
  <ellipse cx="400" cy="340" rx="240" ry="75" fill="none" stroke="#a78bfa" stroke-width="0.25" opacity="0.1" transform="rotate(-5 400 340)"/>

  <!-- Small orbiting bodies -->
  <circle cx="520" cy="320" r="3" fill="#a5b4fc" opacity="0.6" filter="url(#cg)"/>
  <circle cx="280" cy="355" r="2" fill="#c4b5fd" opacity="0.5" filter="url(#cg)"/>
  <circle cx="580" cy="360" r="1.5" fill="#818cf8" opacity="0.4"/>

  <!-- Floating particles -->
  <circle cx="350" cy="280" r="1.5" fill="#818cf8" opacity="0.3"/>
  <circle cx="460" cy="290" r="1" fill="#a78bfa" opacity="0.25"/>
  <circle cx="330" cy="400" r="1.2" fill="#6366f1" opacity="0.3"/>
  <circle cx="480" cy="390" r="0.8" fill="#c4b5fd" opacity="0.2"/>

  <!-- Title text -->
  <text x="400" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="400" fill="white" letter-spacing="4" opacity="0.9">CELESTIAL DRIFT</text>
  <text x="400" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#93c5fd" letter-spacing="7" opacity="0.65">AMBIENT SOUND JOURNEY</text>

  <!-- Decorative line -->
  <line x1="300" y1="650" x2="500" y2="650" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
  <circle cx="400" cy="650" r="2" fill="#818cf8" opacity="0.4"/>

  <!-- Branding -->
  <text x="400" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" letter-spacing="4" opacity="0.45">HEMISYNC.ORG</text>
</svg>
