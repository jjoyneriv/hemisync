<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="zg-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0a2015"/>
      <stop offset="45%" stop-color="#06140c"/>
      <stop offset="100%" stop-color="#020a06"/>
    </radialGradient>
    <radialGradient id="zg-nebula1" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#2e7d32" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1b5e20" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="zg-nebula2" cx="60%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#00897b" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#004d40" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="zg-nebula3" cx="50%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#66bb6a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="zg-stoneGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5d6a7" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4caf50" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="zg-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="zg-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="zg-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="zg-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#zg-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="300" cy="300" rx="260" ry="200" fill="url(#zg-nebula1)" filter="url(#zg-blur1)"/>
  <ellipse cx="520" cy="400" rx="220" ry="180" fill="url(#zg-nebula2)" filter="url(#zg-blur1)"/>
  <ellipse cx="400" cy="280" rx="180" ry="130" fill="url(#zg-nebula3)" filter="url(#zg-blur1)"/>

  <!-- Stars field -->
  <circle cx="85" cy="58" r="1.2" fill="#ffffff" opacity="0.65"/>
  <circle cx="225" cy="48" r="0.8" fill="#c8e6c9" opacity="0.6"/>
  <circle cx="372" cy="72" r="1.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="535" cy="55" r="1" fill="#a5d6a7" opacity="0.6"/>
  <circle cx="648" cy="88" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="718" cy="42" r="0.9" fill="#c8e6c9" opacity="0.5"/>
  <circle cx="68" cy="205" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="732" cy="232" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="55" cy="365" r="0.9" fill="#c8e6c9" opacity="0.5"/>
  <circle cx="748" cy="345" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="138" cy="152" r="1.5" fill="#ffffff" opacity="0.75"/>
  <circle cx="668" cy="162" r="0.7" fill="#a5d6a7" opacity="0.55"/>
  <circle cx="182" cy="448" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="618" cy="452" r="1.2" fill="#c8e6c9" opacity="0.55"/>
  <circle cx="478" cy="112" r="0.8" fill="#ffffff" opacity="0.65"/>
  <circle cx="312" cy="505" r="1.1" fill="#ffffff" opacity="0.45"/>
  <circle cx="555" cy="738" r="0.7" fill="#ffffff" opacity="0.45"/>
  <circle cx="222" cy="715" r="0.9" fill="#c8e6c9" opacity="0.4"/>

  <!-- Raked sand circles (concentric ellipses) — main pattern -->
  <ellipse cx="400" cy="340" rx="220" ry="110" stroke="#4caf50" stroke-width="0.4" fill="none" opacity="0.1" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="195" ry="97" stroke="#66bb6a" stroke-width="0.4" fill="none" opacity="0.12" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="170" ry="85" stroke="#81c784" stroke-width="0.4" fill="none" opacity="0.13" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="145" ry="72" stroke="#a5d6a7" stroke-width="0.4" fill="none" opacity="0.14" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="120" ry="60" stroke="#66bb6a" stroke-width="0.4" fill="none" opacity="0.15" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="95" ry="47" stroke="#4caf50" stroke-width="0.5" fill="none" opacity="0.16" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="70" ry="35" stroke="#81c784" stroke-width="0.5" fill="none" opacity="0.18" transform="rotate(-5 400 340)"/>
  <ellipse cx="400" cy="340" rx="45" ry="22" stroke="#a5d6a7" stroke-width="0.5" fill="none" opacity="0.2" transform="rotate(-5 400 340)"/>

  <!-- Secondary raked pattern (smaller, offset) -->
  <ellipse cx="280" cy="400" rx="80" ry="40" stroke="#4caf50" stroke-width="0.3" fill="none" opacity="0.08"/>
  <ellipse cx="280" cy="400" rx="60" ry="30" stroke="#66bb6a" stroke-width="0.3" fill="none" opacity="0.1"/>
  <ellipse cx="280" cy="400" rx="40" ry="20" stroke="#81c784" stroke-width="0.3" fill="none" opacity="0.12"/>

  <!-- Zen stones — group of 3 -->
  <circle cx="400" cy="340" r="18" fill="#1b5e20" opacity="0.25" filter="url(#zg-blur3)"/>
  <circle cx="400" cy="340" r="14" fill="#2e7d32" opacity="0.2"/>
  <circle cx="400" cy="340" r="8" fill="#388e3c" opacity="0.15"/>
  <ellipse cx="398" cy="343" rx="12" ry="10" fill="#0a2015" opacity="0.1"/>

  <!-- Second stone -->
  <circle cx="280" cy="400" r="10" fill="#1b5e20" opacity="0.2" filter="url(#zg-blur3)"/>
  <circle cx="280" cy="400" r="7" fill="#2e7d32" opacity="0.15"/>

  <!-- Third stone -->
  <circle cx="520" cy="310" r="8" fill="#1b5e20" opacity="0.18" filter="url(#zg-blur3)"/>
  <circle cx="520" cy="310" r="5" fill="#2e7d32" opacity="0.12"/>

  <!-- Bamboo stalks — vertical lines -->
  <line x1="120" y1="150" x2="120" y2="520" stroke="#2e7d32" stroke-width="2" opacity="0.12"/>
  <line x1="120" y1="250" x2="120" y2="250" stroke="#4caf50" stroke-width="3" opacity="0.08"/>
  <line x1="140" y1="180" x2="140" y2="500" stroke="#388e3c" stroke-width="1.5" opacity="0.1"/>
  <line x1="155" y1="200" x2="155" y2="480" stroke="#2e7d32" stroke-width="1" opacity="0.08"/>

  <!-- Bamboo nodes -->
  <line x1="116" y1="250" x2="124" y2="250" stroke="#4caf50" stroke-width="2.5" opacity="0.1"/>
  <line x1="116" y1="350" x2="124" y2="350" stroke="#4caf50" stroke-width="2.5" opacity="0.1"/>
  <line x1="136" y1="280" x2="144" y2="280" stroke="#4caf50" stroke-width="2" opacity="0.08"/>
  <line x1="136" y1="380" x2="144" y2="380" stroke="#4caf50" stroke-width="2" opacity="0.08"/>

  <!-- Bamboo leaves (simple angular paths) -->
  <path d="M122 230 Q140 220, 160 225" stroke="#4caf50" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M122 310 Q100 300, 85 305" stroke="#66bb6a" stroke-width="0.7" fill="none" opacity="0.1"/>
  <path d="M142 260 Q162 250, 175 258" stroke="#4caf50" stroke-width="0.6" fill="none" opacity="0.1"/>

  <!-- Right side bamboo -->
  <line x1="680" y1="170" x2="680" y2="510" stroke="#2e7d32" stroke-width="1.8" opacity="0.1"/>
  <line x1="660" y1="190" x2="660" y2="490" stroke="#388e3c" stroke-width="1.2" opacity="0.08"/>
  <line x1="676" y1="270" x2="684" y2="270" stroke="#4caf50" stroke-width="2" opacity="0.08"/>
  <line x1="676" y1="370" x2="684" y2="370" stroke="#4caf50" stroke-width="2" opacity="0.08"/>
  <path d="M678 240 Q655 230, 640 235" stroke="#66bb6a" stroke-width="0.7" fill="none" opacity="0.1"/>

  <!-- Soft ambient glow around stone -->
  <circle cx="400" cy="340" r="40" fill="url(#zg-stoneGlow)" filter="url(#zg-blur2)"/>

  <!-- Floating particles -->
  <circle cx="350" cy="280" r="1" fill="#a5d6a7" opacity="0.25" filter="url(#zg-blur3)"/>
  <circle cx="460" cy="300" r="0.8" fill="#81c784" opacity="0.2" filter="url(#zg-blur3)"/>
  <circle cx="330" cy="370" r="1.2" fill="#66bb6a" opacity="0.2" filter="url(#zg-blur3)"/>
  <circle cx="470" cy="380" r="0.9" fill="#a5d6a7" opacity="0.2" filter="url(#zg-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#ffffff" letter-spacing="4" opacity="0.9" filter="url(#zg-glow)">ZEN GARDEN</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#81c784" letter-spacing="6" opacity="0.65">STILLNESS PRACTICE</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#4caf50" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#66bb6a" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>