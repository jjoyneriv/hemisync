<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="mp-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#2a1008"/>
      <stop offset="45%" stop-color="#1a0804"/>
      <stop offset="100%" stop-color="#0a0302"/>
    </radialGradient>
    <radialGradient id="mp-nebula1" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e65100" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#bf360c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mp-nebula2" cx="60%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#d32f2f" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#b71c1c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mp-nebula3" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#ff6e40" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mp-coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a65" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#e64a19" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#bf360c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="mp-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="mp-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="mp-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="mp-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#mp-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="320" cy="300" rx="260" ry="200" fill="url(#mp-nebula1)" filter="url(#mp-blur1)"/>
  <ellipse cx="500" cy="380" rx="230" ry="180" fill="url(#mp-nebula2)" filter="url(#mp-blur1)"/>
  <ellipse cx="400" cy="300" rx="180" ry="140" fill="url(#mp-nebula3)" filter="url(#mp-blur1)"/>

  <!-- Stars field -->
  <circle cx="100" cy="65" r="1.2" fill="#ffffff" opacity="0.65"/>
  <circle cx="235" cy="42" r="0.8" fill="#ffccbc" opacity="0.6"/>
  <circle cx="375" cy="78" r="1.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="530" cy="52" r="1" fill="#ffab91" opacity="0.6"/>
  <circle cx="650" cy="92" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="705" cy="38" r="0.9" fill="#ffccbc" opacity="0.5"/>
  <circle cx="72" cy="215" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="738" cy="225" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="48" cy="375" r="0.9" fill="#ffccbc" opacity="0.5"/>
  <circle cx="752" cy="355" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="142" cy="148" r="1.5" fill="#ffffff" opacity="0.75"/>
  <circle cx="662" cy="158" r="0.7" fill="#ffab91" opacity="0.55"/>
  <circle cx="178" cy="455" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="622" cy="468" r="1.2" fill="#ffccbc" opacity="0.55"/>
  <circle cx="485" cy="108" r="0.8" fill="#ffffff" opacity="0.65"/>
  <circle cx="308" cy="498" r="1.1" fill="#ffffff" opacity="0.45"/>
  <circle cx="570" cy="735" r="0.7" fill="#ffffff" opacity="0.45"/>
  <circle cx="215" cy="710" r="0.9" fill="#ffccbc" opacity="0.4"/>
  <circle cx="445" cy="765" r="0.6" fill="#ffffff" opacity="0.5"/>

  <!-- Concentric pulsing circles (radiating energy) -->
  <circle cx="400" cy="320" r="200" stroke="#e64a19" stroke-width="0.5" fill="none" opacity="0.08"/>
  <circle cx="400" cy="320" r="170" stroke="#ff5722" stroke-width="0.6" fill="none" opacity="0.1"/>
  <circle cx="400" cy="320" r="140" stroke="#ff6e40" stroke-width="0.7" fill="none" opacity="0.12"/>
  <circle cx="400" cy="320" r="110" stroke="#ff8a65" stroke-width="0.8" fill="none" opacity="0.15"/>
  <circle cx="400" cy="320" r="80" stroke="#ffab91" stroke-width="0.9" fill="none" opacity="0.18"/>
  <circle cx="400" cy="320" r="50" stroke="#ffccbc" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Warm radiating energy glow -->
  <circle cx="400" cy="320" r="60" fill="url(#mp-coreGlow)" filter="url(#mp-blur2)"/>
  <circle cx="400" cy="320" r="25" fill="#ff8a65" opacity="0.15" filter="url(#mp-blur3)"/>
  <circle cx="400" cy="320" r="8" fill="#ffccbc" opacity="0.3" filter="url(#mp-blur3)"/>
  <circle cx="400" cy="320" r="3" fill="#fff3e0" opacity="0.6"/>

  <!-- Heartbeat/pulse wave line -->
  <path d="M60 320 L180 320 L200 320 L220 318 L240 320 L260 320 L280 320 L300 320 L310 320 L320 310 L330 340 L340 280 L350 370 L360 250 L370 380 L380 300 L390 330 L400 320 L410 330 L420 300 L430 380 L440 250 L450 370 L460 280 L470 340 L480 310 L490 320 L500 320 L520 320 L540 318 L560 320 L580 320 L600 320 L620 320 L740 320"
    stroke="#ff6e40" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#mp-glow)"/>

  <!-- Second pulse wave (echo) -->
  <path d="M60 320 L180 320 L200 320 L220 318 L240 320 L260 320 L280 320 L300 320 L310 320 L320 310 L330 340 L340 280 L350 370 L360 250 L370 380 L380 300 L390 330 L400 320 L410 330 L420 300 L430 380 L440 250 L450 370 L460 280 L470 340 L480 310 L490 320 L500 320 L520 320 L540 318 L560 320 L580 320 L600 320 L620 320 L740 320"
    stroke="#e64a19" stroke-width="2.5" fill="none" opacity="0.12" filter="url(#mp-blur2)"/>

  <!-- Life-force dots along pulse -->
  <circle cx="340" cy="280" r="2.5" fill="#ff6e40" opacity="0.5" filter="url(#mp-blur3)"/>
  <circle cx="360" cy="250" r="2" fill="#ff8a65" opacity="0.45" filter="url(#mp-blur3)"/>
  <circle cx="400" cy="320" r="3" fill="#ffab91" opacity="0.5" filter="url(#mp-blur3)"/>
  <circle cx="440" cy="250" r="2" fill="#ff8a65" opacity="0.45" filter="url(#mp-blur3)"/>
  <circle cx="460" cy="280" r="2.5" fill="#ff6e40" opacity="0.5" filter="url(#mp-blur3)"/>

  <!-- Scattered energy dots -->
  <circle cx="250" cy="280" r="1.5" fill="#ff5722" opacity="0.25" filter="url(#mp-blur3)"/>
  <circle cx="550" cy="290" r="1.3" fill="#ff6e40" opacity="0.2" filter="url(#mp-blur3)"/>
  <circle cx="300" cy="400" r="1.8" fill="#e64a19" opacity="0.2" filter="url(#mp-blur3)"/>
  <circle cx="500" cy="410" r="1.2" fill="#ff8a65" opacity="0.25" filter="url(#mp-blur3)"/>
  <circle cx="350" cy="230" r="1" fill="#ffab91" opacity="0.2" filter="url(#mp-blur3)"/>
  <circle cx="450" cy="420" r="1.4" fill="#ff5722" opacity="0.2" filter="url(#mp-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#ffffff" letter-spacing="4" opacity="0.9" filter="url(#mp-glow)">MINDFUL PULSE</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ff8a65" letter-spacing="6" opacity="0.65">ACTIVE MEDITATION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#e64a19" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#ff6e40" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bf360c" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>