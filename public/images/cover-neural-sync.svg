  <line x1="200" y1="0" x2="200" y2="800" stroke="#33691e" stroke-width="0.3" opacity="0.05"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#33691e" stroke-width="0.3" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#33691e" stroke-width="0.3" opacity="0.06"/>
