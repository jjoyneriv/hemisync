  <line x1="400" y1="300" x2="520" y2="230" stroke="#76ff03" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="300" x2="340" y2="400" stroke="#64dd17" stroke-width="0.5" opacity="0.18"/>
  <line x1="400" y1="300" x2="480" y2="390" stroke="#64dd17" stroke-width="0.5" opacity="0.18"/>
