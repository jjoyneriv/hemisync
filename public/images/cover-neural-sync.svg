  <line x1="250" y1="330" x2="170" y2="360" stroke="#aed581" stroke-width="0.3" opacity="0.08"/>
  <line x1="560" y1="310" x2="640" y2="350" stroke="#aed581" stroke-width="0.3" opacity="0.08"/>

