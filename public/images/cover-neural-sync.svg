  <circle cx="315" cy="502" r="1.1" fill="#ffffff" opacity="0.45"/>
  <circle cx="565" cy="742" r="0.7" fill="#ffffff" opacity="0.45"/>
  <circle cx="218" cy="718" r="0.9" fill="#ccff90" opacity="0.4"/>
  <circle cx="448" cy="768" r="0.6" fill="#ffffff" opacity="0.5"/>

