  <circle cx="320" cy="460" r="1.5" fill="#b2ff59" opacity="0.35" filter="url(#ns-blur3)"/>
  <circle cx="480" cy="460" r="1.5" fill="#b2ff59" opacity="0.35" filter="url(#ns-blur3)"/>
  <circle cx="640" cy="460" r="1.5" fill="#b2ff59" opacity="0.35" filter="url(#ns-blur3)"/>

  <!-- Title -->
