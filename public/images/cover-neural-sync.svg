  <ellipse cx="520" cy="390" rx="230" ry="180" fill="url(#ns-nebula2)" filter="url(#ns-blur1)"/>
  <ellipse cx="400" cy="290" rx="180" ry="130" fill="url(#ns-nebula3)" filter="url(#ns-blur1)"/>

  <!-- Stars field -->
  <circle cx="92" cy="62" r="1.2" fill="#ffffff" opacity="0.65"/>
  <circle cx="228" cy="45" r="0.8" fill="#ccff90" opacity="0.6"/>
  <circle cx="368" cy="75" r="1.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="532" cy="58" r="1" fill="#b2ff59" opacity="0.6"/>
  <circle cx="655" cy="95" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="712" cy="38" r="0.9" fill="#ccff90" opacity="0.5"/>
