  <circle cx="620" cy="190" r="2" fill="#aed581" opacity="0.3"/>
  <circle cx="220" cy="310" r="1.5" fill="#aed581" opacity="0.25"/>
  <circle cx="590" cy="320" r="1.5" fill="#aed581" opacity="0.25"/>
  <circle cx="250" cy="450" r="1.8" fill="#aed581" opacity="0.25"/>
