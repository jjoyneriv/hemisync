<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="ns-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="45%" stop-color="#061206"/>
      <stop offset="100%" stop-color="#020802"/>
    </radialGradient>
    <radialGradient id="ns-nebula1" cx="35%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#33691e" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1b5e20" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ns-nebula2" cx="65%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#76ff03" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#64dd17" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ns-nebula3" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#aed581" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ns-nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b2ff59" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#76ff03" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="ns-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="ns-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="ns-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="ns-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

