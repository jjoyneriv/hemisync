  <line x1="0" y1="100" x2="800" y2="100" stroke="#33691e" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#33691e" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#33691e" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#33691e" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#33691e" stroke-width="0.3" opacity="0.05"/>

