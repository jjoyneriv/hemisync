  <circle cx="250" cy="330" r="1.5" fill="#ccff90" opacity="0.4"/>

  <circle cx="560" cy="310" r="6" fill="#76ff03" opacity="0.04" filter="url(#ns-blur3)"/>
  <circle cx="560" cy="310" r="3" fill="#aed581" opacity="0.2"/>
  <circle cx="560" cy="310" r="1.5" fill="#ccff90" opacity="0.4"/>

