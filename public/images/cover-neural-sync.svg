  <circle cx="340" cy="150" r="1.5" fill="#aed581" opacity="0.25"/>
  <circle cx="480" cy="150" r="1.5" fill="#aed581" opacity="0.25"/>
  <circle cx="170" cy="360" r="1.2" fill="#aed581" opacity="0.2"/>
  <circle cx="640" cy="350" r="1.2" fill="#aed581" opacity="0.2"/>

  <!-- Brainwave sine patterns -->
  <path d="M80 460 Q120 440, 160 460 Q200 480, 240 460 Q280 440, 320 460 Q360 480, 400 460 Q440 440, 480 460 Q520 480, 560 460 Q600 440, 640 460 Q680 480, 720 460" stroke="#76ff03" stroke-width="1" fill="none" opacity="0.2" filter="url(#ns-glow)"/>
  <path d="M80 490 Q140 470, 200 490 Q260 510, 320 490 Q380 470, 440 490 Q500 510, 560 490 Q620 470, 680 490 Q720 505, 720 490" stroke="#64dd17" stroke-width="0.8" fill="none" opacity="0.15"/>
  <path d="M80 510 Q160 495, 240 510 Q320 525, 400 510 Q480 495, 560 510 Q640 525, 720 510" stroke="#aed581" stroke-width="0.6" fill="none" opacity="0.1"/>

