<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="nl-bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="45%" stop-color="#060e1a"/>
      <stop offset="100%" stop-color="#02050a"/>
    </radialGradient>
    <radialGradient id="nl-nebula1" cx="40%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#2e7d32" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1b5e20" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nl-nebula2" cx="60%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#7b1fa2" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#4a148c" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nl-nebula3" cx="50%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#66bb6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nl-aurora1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#43a047" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#7b1fa2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a148c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nl-aurora2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81c784" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ab47bc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6a1b9a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nl-aurora3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5d6a7" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ce93d8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="nl-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="nl-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="nl-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="nl-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nl-wideblur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#nl-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="350" cy="250" rx="300" ry="200" fill="url(#nl-nebula1)" filter="url(#nl-blur1)"/>
  <ellipse cx="500" cy="280" rx="250" ry="180" fill="url(#nl-nebula2)" filter="url(#nl-blur1)"/>
  <ellipse cx="400" cy="220" rx="200" ry="150" fill="url(#nl-nebula3)" filter="url(#nl-blur1)"/>

  <!-- Stars -->
  <circle cx="95" cy="60" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="220" cy="45" r="0.8" fill="#c8e6c9" opacity="0.65"/>
  <circle cx="380" cy="70" r="1.4" fill="#ffffff" opacity="0.85"/>
  <circle cx="525" cy="55" r="1" fill="#e1bee7" opacity="0.7"/>
  <circle cx="655" cy="85" r="1.3" fill="#ffffff" opacity="0.65"/>
  <circle cx="715" cy="35" r="0.9" fill="#c8e6c9" opacity="0.55"/>
  <circle cx="70" cy="210" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="740" cy="180" r="1" fill="#e1bee7" opacity="0.5"/>
  <circle cx="50" cy="320" r="0.9" fill="#c8e6c9" opacity="0.5"/>
  <circle cx="760" cy="300" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="135" cy="145" r="1.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="670" cy="120" r="0.7" fill="#e1bee7" opacity="0.6"/>
  <circle cx="170" cy="380" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="630" cy="350" r="1.2" fill="#c8e6c9" opacity="0.5"/>
  <circle cx="475" cy="100" r="0.8" fill="#ffffff" opacity="0.75"/>
  <circle cx="315" cy="160" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="560" cy="130" r="0.7" fill="#e1bee7" opacity="0.45"/>
  <circle cx="200" cy="95" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="600" cy="40" r="1" fill="#c8e6c9" opacity="0.6"/>

  <!-- Aurora curtain waves — ribbon 1 -->
  <path d="M80 100 Q180 80, 280 120 Q350 150, 400 100 Q450 50, 530 110 Q620 170, 720 90"
        fill="none" stroke="url(#nl-aurora1)" stroke-width="40" opacity="0.2" filter="url(#nl-wideblur)"/>
  <path d="M80 100 Q180 80, 280 120 Q350 150, 400 100 Q450 50, 530 110 Q620 170, 720 90"
        fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.3"/>

  <!-- Aurora curtain waves — ribbon 2 -->
  <path d="M60 180 Q160 150, 260 200 Q340 240, 420 180 Q500 120, 580 190 Q660 260, 740 170"
        fill="none" stroke="url(#nl-aurora2)" stroke-width="35" opacity="0.18" filter="url(#nl-wideblur)"/>
  <path d="M60 180 Q160 150, 260 200 Q340 240, 420 180 Q500 120, 580 190 Q660 260, 740 170"
        fill="none" stroke="#81c784" stroke-width="1" opacity="0.25"/>

  <!-- Aurora curtain waves — ribbon 3 -->
  <path d="M100 260 Q200 230, 300 280 Q370 310, 430 260 Q490 210, 560 270 Q640 330, 700 250"
        fill="none" stroke="url(#nl-aurora3)" stroke-width="30" opacity="0.15" filter="url(#nl-wideblur)"/>
  <path d="M100 260 Q200 230, 300 280 Q370 310, 430 260 Q490 210, 560 270 Q640 330, 700 250"
        fill="none" stroke="#a5d6a7" stroke-width="0.8" opacity="0.2"/>

  <!-- Dancing light ribbons — thinner accent lines -->
  <path d="M120 140 Q220 110, 320 160 Q380 190, 440 140 Q500 90, 580 150 Q660 210, 700 130"
        fill="none" stroke="#ce93d8" stroke-width="0.6" opacity="0.2"/>
  <path d="M150 220 Q240 190, 340 240 Q400 270, 460 220 Q520 170, 600 230 Q670 280, 720 210"
        fill="none" stroke="#ab47bc" stroke-width="0.5" opacity="0.15"/>

  <!-- Vertical aurora shimmer lines -->
  <line x1="280" y1="100" x2="280" y2="350" stroke="#66bb6a" stroke-width="0.4" opacity="0.1"/>
  <line x1="350" y1="80" x2="350" y2="380" stroke="#81c784" stroke-width="0.5" opacity="0.12"/>
  <line x1="420" y1="60" x2="420" y2="350" stroke="#66bb6a" stroke-width="0.4" opacity="0.1"/>
  <line x1="490" y1="90" x2="490" y2="360" stroke="#ab47bc" stroke-width="0.4" opacity="0.08"/>
  <line x1="560" y1="110" x2="560" y2="340" stroke="#81c784" stroke-width="0.3" opacity="0.08"/>

  <!-- Mountain silhouette at bottom -->
  <path d="M0 520 L80 440 L140 470 L220 400 L280 430 L360 380 L400 360 L440 380 L520 430 L580 400 L660 470 L720 440 L800 520 L800 800 L0 800Z"
        fill="#060e1a" opacity="0.95"/>
  <path d="M0 520 L80 440 L140 470 L220 400 L280 430 L360 380 L400 360 L440 380 L520 430 L580 400 L660 470 L720 440 L800 520"
        fill="none" stroke="#1b5e20" stroke-width="0.8" opacity="0.3"/>

  <!-- Aurora reflection glow on mountains -->
  <ellipse cx="400" cy="400" rx="200" ry="40" fill="#2e7d32" opacity="0.06" filter="url(#nl-blur1)"/>

  <!-- Floating particles -->
  <circle cx="300" cy="200" r="1.5" fill="#a5d6a7" opacity="0.4" filter="url(#nl-blur3)"/>
  <circle cx="500" cy="180" r="1.2" fill="#ce93d8" opacity="0.35" filter="url(#nl-blur3)"/>
  <circle cx="350" cy="300" r="1.8" fill="#81c784" opacity="0.3" filter="url(#nl-blur3)"/>
  <circle cx="450" cy="250" r="1" fill="#a5d6a7" opacity="0.3" filter="url(#nl-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#ffffff" letter-spacing="4" opacity="0.9" filter="url(#nl-glow)">NORTHERN LIGHTS</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#a5d6a7" letter-spacing="5" opacity="0.65">WONDER MEDITATION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#2e7d32" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#a5d6a7" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>