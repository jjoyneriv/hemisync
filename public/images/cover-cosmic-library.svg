<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="cl-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#2a2008"/>
      <stop offset="45%" stop-color="#1a1404"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <radialGradient id="cl-nebula1" cx="35%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f9a825" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#f57f17" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cl-nebula2" cx="65%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ffb300" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ff8f00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cl-nebula3" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#ffca28" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cl-coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe082" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#ffb300" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ff8f00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cl-eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffe082" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="cl-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="cl-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="cl-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="cl-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#cl-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="310" cy="310" rx="270" ry="210" fill="url(#cl-nebula1)" filter="url(#cl-blur1)"/>
  <ellipse cx="520" cy="380" rx="230" ry="180" fill="url(#cl-nebula2)" filter="url(#cl-blur1)"/>
  <ellipse cx="400" cy="290" rx="180" ry="130" fill="url(#cl-nebula3)" filter="url(#cl-blur1)"/>

  <!-- Stars field -->
  <circle cx="92" cy="60" r="1.2" fill="#ffffff" opacity="0.65"/>
  <circle cx="228" cy="45" r="0.8" fill="#fff9c4" opacity="0.6"/>
  <circle cx="372" cy="78" r="1.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="535" cy="52" r="1" fill="#ffe082" opacity="0.6"/>
  <circle cx="652" cy="92" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="715" cy="38" r="0.9" fill="#fff9c4" opacity="0.5"/>
  <circle cx="72" cy="208" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="735" cy="225" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="52" cy="375" r="0.9" fill="#fff9c4" opacity="0.5"/>
  <circle cx="755" cy="348" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="138" cy="148" r="1.5" fill="#ffffff" opacity="0.75"/>
  <circle cx="668" cy="155" r="0.7" fill="#ffe082" opacity="0.55"/>
  <circle cx="178" cy="455" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="625" cy="468" r="1.2" fill="#fff9c4" opacity="0.55"/>
  <circle cx="482" cy="105" r="0.8" fill="#ffffff" opacity="0.65"/>
  <circle cx="315" cy="502" r="1.1" fill="#ffffff" opacity="0.45"/>
  <circle cx="562" cy="738" r="0.7" fill="#ffffff" opacity="0.45"/>
  <circle cx="222" cy="715" r="0.9" fill="#fff9c4" opacity="0.4"/>
  <circle cx="445" cy="765" r="0.6" fill="#ffffff" opacity="0.5"/>

  <!-- Golden light rays (radiating from center) -->
  <line x1="400" y1="300" x2="400" y2="80" stroke="#ffb300" stroke-width="0.8" opacity="0.08"/>
  <line x1="400" y1="300" x2="200" y2="120" stroke="#ffb300" stroke-width="0.6" opacity="0.06"/>
  <line x1="400" y1="300" x2="600" y2="120" stroke="#ffb300" stroke-width="0.6" opacity="0.06"/>
  <line x1="400" y1="300" x2="130" y2="250" stroke="#ffb300" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="300" x2="670" y2="250" stroke="#ffb300" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="300" x2="120" y2="400" stroke="#ffb300" stroke-width="0.4" opacity="0.04"/>
  <line x1="400" y1="300" x2="680" y2="400" stroke="#ffb300" stroke-width="0.4" opacity="0.04"/>
  <line x1="400" y1="300" x2="250" y2="500" stroke="#ffb300" stroke-width="0.4" opacity="0.04"/>
  <line x1="400" y1="300" x2="550" y2="500" stroke="#ffb300" stroke-width="0.4" opacity="0.04"/>

  <!-- Golden spiral (Fibonacci-like) -->
  <path d="M400 300 Q420 300, 420 280 Q420 260, 400 260 Q370 260, 370 290 Q370 330, 410 330 Q450 330, 450 280 Q450 240, 400 240 Q340 240, 340 300 Q340 360, 400 360 Q470 360, 470 280 Q470 210, 400 210 Q310 210, 310 300 Q310 400, 400 400"
    stroke="#ffb300" stroke-width="0.8" fill="none" opacity="0.2"/>
  <path d="M400 400 Q500 400, 500 290 Q500 180, 400 180 Q280 180, 280 300 Q280 430, 400 430 Q530 430, 530 290 Q530 150, 400 150"
    stroke="#ffd54f" stroke-width="0.6" fill="none" opacity="0.12"/>

  <!-- Book-like open shapes -->
  <!-- Left page -->
  <path d="M320 380 Q320 340, 350 310 Q370 295, 398 290" stroke="#ffb300" stroke-width="0.6" fill="none" opacity="0.15"/>
  <path d="M330 390 Q330 355, 355 328 Q372 315, 398 310" stroke="#ffd54f" stroke-width="0.4" fill="none" opacity="0.12"/>
  <path d="M340 400 Q340 370, 360 345 Q375 335, 398 330" stroke="#ffe082" stroke-width="0.3" fill="none" opacity="0.1"/>
  <!-- Right page -->
  <path d="M480 380 Q480 340, 450 310 Q430 295, 402 290" stroke="#ffb300" stroke-width="0.6" fill="none" opacity="0.15"/>
  <path d="M470 390 Q470 355, 445 328 Q428 315, 402 310" stroke="#ffd54f" stroke-width="0.4" fill="none" opacity="0.12"/>
  <path d="M460 400 Q460 370, 440 345 Q425 335, 402 330" stroke="#ffe082" stroke-width="0.3" fill="none" opacity="0.1"/>
  <!-- Spine -->
  <line x1="400" y1="280" x2="400" y2="410" stroke="#ffb300" stroke-width="0.5" opacity="0.15"/>

  <!-- Wisdom eye -->
  <ellipse cx="400" cy="280" rx="35" ry="18" stroke="#ffb300" stroke-width="0.8" fill="none" opacity="0.2"/>
  <circle cx="400" cy="280" r="10" fill="url(#cl-eyeGlow)" filter="url(#cl-blur3)"/>
  <circle cx="400" cy="280" r="5" fill="#ffe082" opacity="0.25" filter="url(#cl-blur3)"/>
  <circle cx="400" cy="280" r="2" fill="#fff8e1" opacity="0.5"/>

  <!-- Golden core glow -->
  <circle cx="400" cy="300" r="60" fill="url(#cl-coreGlow)" filter="url(#cl-blur2)" opacity="0.4"/>

  <!-- Constellation dots forming patterns (knowledge constellation) -->
  <!-- Triangle pattern -->
  <circle cx="300" cy="200" r="2" fill="#ffd54f" opacity="0.4" filter="url(#cl-glow)"/>
  <circle cx="500" cy="200" r="2" fill="#ffd54f" opacity="0.4" filter="url(#cl-glow)"/>
  <circle cx="400" cy="120" r="2" fill="#ffd54f" opacity="0.4" filter="url(#cl-glow)"/>
  <line x1="300" y1="200" x2="500" y2="200" stroke="#ffd54f" stroke-width="0.3" opacity="0.15"/>
  <line x1="500" y1="200" x2="400" y2="120" stroke="#ffd54f" stroke-width="0.3" opacity="0.15"/>
  <line x1="400" y1="120" x2="300" y2="200" stroke="#ffd54f" stroke-width="0.3" opacity="0.15"/>

  <!-- Square pattern -->
  <circle cx="250" cy="350" r="1.5" fill="#ffe082" opacity="0.35" filter="url(#cl-glow)"/>
  <circle cx="250" cy="430" r="1.5" fill="#ffe082" opacity="0.35" filter="url(#cl-glow)"/>
  <circle cx="180" cy="390" r="1.5" fill="#ffe082" opacity="0.35" filter="url(#cl-glow)"/>
  <circle cx="320" cy="390" r="1.5" fill="#ffe082" opacity="0.35" filter="url(#cl-glow)"/>
  <line x1="250" y1="350" x2="320" y2="390" stroke="#ffe082" stroke-width="0.25" opacity="0.12"/>
  <line x1="320" y1="390" x2="250" y2="430" stroke="#ffe082" stroke-width="0.25" opacity="0.12"/>
  <line x1="250" y1="430" x2="180" y2="390" stroke="#ffe082" stroke-width="0.25" opacity="0.12"/>
  <line x1="180" y1="390" x2="250" y2="350" stroke="#ffe082" stroke-width="0.25" opacity="0.12"/>

  <!-- Arc constellation -->
  <circle cx="560" cy="350" r="1.5" fill="#ffd54f" opacity="0.3" filter="url(#cl-glow)"/>
  <circle cx="600" cy="380" r="1.5" fill="#ffd54f" opacity="0.3" filter="url(#cl-glow)"/>
  <circle cx="620" cy="420" r="1.5" fill="#ffd54f" opacity="0.3" filter="url(#cl-glow)"/>
  <circle cx="610" cy="460" r="1.5" fill="#ffd54f" opacity="0.3" filter="url(#cl-glow)"/>
  <line x1="560" y1="350" x2="600" y2="380" stroke="#ffd54f" stroke-width="0.25" opacity="0.1"/>
  <line x1="600" y1="380" x2="620" y2="420" stroke="#ffd54f" stroke-width="0.25" opacity="0.1"/>
  <line x1="620" y1="420" x2="610" y2="460" stroke="#ffd54f" stroke-width="0.25" opacity="0.1"/>

  <!-- Floating golden particles -->
  <circle cx="350" cy="250" r="1.5" fill="#ffd54f" opacity="0.3" filter="url(#cl-blur3)"/>
  <circle cx="455" cy="255" r="1.2" fill="#ffe082" opacity="0.25" filter="url(#cl-blur3)"/>
  <circle cx="330" cy="360" r="1.8" fill="#ffb300" opacity="0.2" filter="url(#cl-blur3)"/>
  <circle cx="475" cy="370" r="1" fill="#ffd54f" opacity="0.25" filter="url(#cl-blur3)"/>
  <circle cx="380" cy="210" r="1.1" fill="#ffe082" opacity="0.2" filter="url(#cl-blur3)"/>
  <circle cx="420" cy="440" r="1.4" fill="#ffb300" opacity="0.2" filter="url(#cl-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#ffffff" letter-spacing="3" opacity="0.9" filter="url(#cl-glow)">COSMIC LIBRARY</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffd54f" letter-spacing="6" opacity="0.65">KNOWLEDGE MEDITATION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#ffb300" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#ffd54f" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f57f17" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>