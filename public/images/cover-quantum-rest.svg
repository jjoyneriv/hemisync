<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="qr-bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0a1a3a"/>
      <stop offset="40%" stop-color="#060e22"/>
      <stop offset="100%" stop-color="#030812"/>
    </radialGradient>
    <radialGradient id="qr-coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4488ff" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#2266dd" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#1144aa" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a1a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qr-innerCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ccff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4488ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2266dd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qr-particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="qr-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="qr-blur2">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="qr-blur3">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="qr-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="qr-pulseGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#qr-bg)"/>

  <!-- Nebula glows -->
  <ellipse cx="350" cy="280" rx="200" ry="180" fill="#1144aa" opacity="0.07" filter="url(#qr-blur1)"/>
  <ellipse cx="480" cy="320" rx="180" ry="160" fill="#2266cc" opacity="0.05" filter="url(#qr-blur1)"/>
  <ellipse cx="400" cy="350" rx="220" ry="130" fill="#1155bb" opacity="0.06" filter="url(#qr-blur1)"/>

  <!-- Stars -->
  <circle cx="105" cy="60" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="235" cy="42" r="0.9" fill="#bbddff" opacity="0.6"/>
  <circle cx="365" cy="78" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="515" cy="55" r="1" fill="#ccddff" opacity="0.7"/>
  <circle cx="645" cy="92" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="705" cy="48" r="0.8" fill="#bbddff" opacity="0.5"/>
  <circle cx="72" cy="185" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="735" cy="205" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="55" cy="360" r="0.9" fill="#ccddff" opacity="0.5"/>
  <circle cx="748" cy="385" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="140" cy="140" r="1.6" fill="#ffffff" opacity="0.8"/>
  <circle cx="665" cy="155" r="0.7" fill="#bbddff" opacity="0.6"/>
  <circle cx="175" cy="430" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="625" cy="445" r="1.2" fill="#ccddff" opacity="0.6"/>
  <circle cx="475" cy="118" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="295" cy="475" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="560" cy="485" r="0.9" fill="#bbddff" opacity="0.5"/>
  <circle cx="200" cy="290" r="0.7" fill="#ffffff" opacity="0.4"/>

  <!-- Core glow -->
  <ellipse cx="400" cy="310" rx="150" ry="150" fill="url(#qr-coreGlow)" filter="url(#qr-blur2)"/>

  <!-- Pulsing core -->
  <circle cx="400" cy="310" r="25" fill="url(#qr-innerCore)" filter="url(#qr-pulseGlow)"/>
  <circle cx="400" cy="310" r="12" fill="#88ccff" opacity="0.3" filter="url(#qr-blur3)"/>
  <circle cx="400" cy="310" r="4" fill="#ffffff" opacity="0.8"/>

  <!-- Quantum orbital rings -->
  <!-- Orbit 1 - horizontal ellipse -->
  <ellipse cx="400" cy="310" rx="140" ry="50" stroke="#4488ff" stroke-width="0.8" fill="none" opacity="0.3" transform="rotate(-20,400,310)"/>
  <!-- Orbit 2 - tilted -->
  <ellipse cx="400" cy="310" rx="130" ry="55" stroke="#5599ff" stroke-width="0.7" fill="none" opacity="0.25" transform="rotate(40,400,310)"/>
  <!-- Orbit 3 - opposite tilt -->
  <ellipse cx="400" cy="310" rx="120" ry="60" stroke="#3377ee" stroke-width="0.6" fill="none" opacity="0.2" transform="rotate(-70,400,310)"/>
  <!-- Orbit 4 - steep tilt -->
  <ellipse cx="400" cy="310" rx="110" ry="45" stroke="#6699ff" stroke-width="0.5" fill="none" opacity="0.18" transform="rotate(75,400,310)"/>

  <!-- Particle dots on orbits -->
  <!-- Orbit 1 particles -->
  <circle cx="540" cy="290" r="3" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <circle cx="265" cy="330" r="2.5" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <!-- Orbit 2 particles -->
  <circle cx="470" cy="240" r="2.8" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <circle cx="330" cy="380" r="2.2" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <!-- Orbit 3 particles -->
  <circle cx="360" cy="200" r="2.5" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <circle cx="440" cy="420" r="2" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <!-- Orbit 4 particles -->
  <circle cx="490" cy="380" r="2.3" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>
  <circle cx="310" cy="240" r="2.6" fill="url(#qr-particle)" filter="url(#qr-blur3)"/>

  <!-- Energy field lines -->
  <circle cx="400" cy="310" r="170" stroke="#3366cc" stroke-width="0.3" fill="none" opacity="0.12" stroke-dasharray="4,8"/>
  <circle cx="400" cy="310" r="200" stroke="#2255bb" stroke-width="0.3" fill="none" opacity="0.08" stroke-dasharray="6,12"/>
  <circle cx="400" cy="310" r="230" stroke="#1144aa" stroke-width="0.2" fill="none" opacity="0.06" stroke-dasharray="8,16"/>

  <!-- Radiating energy lines from core -->
  <line x1="400" y1="285" x2="400" y2="200" stroke="#4488ff" stroke-width="0.4" opacity="0.15" stroke-dasharray="2,6"/>
  <line x1="400" y1="335" x2="400" y2="420" stroke="#4488ff" stroke-width="0.4" opacity="0.15" stroke-dasharray="2,6"/>
  <line x1="375" y1="310" x2="290" y2="310" stroke="#4488ff" stroke-width="0.4" opacity="0.15" stroke-dasharray="2,6"/>
  <line x1="425" y1="310" x2="510" y2="310" stroke="#4488ff" stroke-width="0.4" opacity="0.15" stroke-dasharray="2,6"/>
  <line x1="383" y1="293" x2="330" y2="240" stroke="#3377ee" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,6"/>
  <line x1="417" y1="327" x2="470" y2="380" stroke="#3377ee" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,6"/>
  <line x1="417" y1="293" x2="470" y2="240" stroke="#3377ee" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,6"/>
  <line x1="383" y1="327" x2="330" y2="380" stroke="#3377ee" stroke-width="0.3" opacity="0.1" stroke-dasharray="2,6"/>

  <!-- Scattered quantum particles -->
  <circle cx="280" cy="200" r="1.5" fill="#66aaff" opacity="0.25" filter="url(#qr-blur3)"/>
  <circle cx="520" cy="210" r="1.2" fill="#77bbff" opacity="0.2" filter="url(#qr-blur3)"/>
  <circle cx="250" cy="400" r="1.3" fill="#5599ff" opacity="0.2" filter="url(#qr-blur3)"/>
  <circle cx="550" cy="420" r="1.4" fill="#66aaff" opacity="0.22" filter="url(#qr-blur3)"/>
  <circle cx="300" cy="160" r="1" fill="#77bbff" opacity="0.15" filter="url(#qr-blur3)"/>
  <circle cx="500" cy="460" r="1.1" fill="#5599ff" opacity="0.15" filter="url(#qr-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#ffffff" letter-spacing="3" filter="url(#qr-glow)">QUANTUM REST</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5599dd" letter-spacing="6">POWER RECOVERY</text>

  <!-- Decorative line -->
  <line x1="305" y1="668" x2="495" y2="668" stroke="#3366aa" stroke-width="0.5" opacity="0.6"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#445577" letter-spacing="4">HEMISYNC.ORG</text>
</svg>