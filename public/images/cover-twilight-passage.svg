<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="tp-bg" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="45%" stop-color="#0e0e28"/>
      <stop offset="100%" stop-color="#050512"/>
    </radialGradient>
    <radialGradient id="tp-nebula1" cx="40%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3949ab" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1a237e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tp-nebula2" cx="60%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#5c6bc0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#283593" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tp-nebula3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#7986cb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tp-sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a65" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#ef6c00" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#bf360c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tp-skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050512" stop-opacity="1"/>
      <stop offset="30%" stop-color="#1a1a3e" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#303f9f" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#5c6bc0" stop-opacity="0.2"/>
      <stop offset="85%" stop-color="#ef6c00" stop-opacity="0.15"/>
      <stop offset="95%" stop-color="#ff8a65" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffab91" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="tp-band1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c6bc0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7986cb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#9fa8da" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tp-band2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef6c00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff8a65" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffab91" stop-opacity="0"/>
    </linearGradient>
    <filter id="tp-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="tp-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="tp-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="tp-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#tp-bg)"/>

  <!-- Sunset-to-night gradient overlay -->
  <rect width="800" height="800" fill="url(#tp-skyGrad)" opacity="0.5"/>

  <!-- Nebula glows -->
  <ellipse cx="300" cy="280" rx="260" ry="200" fill="url(#tp-nebula1)" filter="url(#tp-blur1)"/>
  <ellipse cx="520" cy="350" rx="230" ry="180" fill="url(#tp-nebula2)" filter="url(#tp-blur1)"/>
  <ellipse cx="400" cy="320" rx="180" ry="130" fill="url(#tp-nebula3)" filter="url(#tp-blur1)"/>

  <!-- Transitional color bands -->
  <rect x="0" y="300" width="800" height="60" fill="url(#tp-band1)" filter="url(#tp-blur1)"/>
  <rect x="0" y="350" width="800" height="50" fill="url(#tp-band2)" filter="url(#tp-blur1)"/>
  <rect x="0" y="380" width="800" height="40" fill="url(#tp-band2)" opacity="0.6" filter="url(#tp-blur1)"/>

  <!-- Horizon line glow -->
  <ellipse cx="400" cy="400" rx="400" ry="15" fill="#ef6c00" opacity="0.06" filter="url(#tp-blur1)"/>
  <ellipse cx="400" cy="400" rx="350" ry="8" fill="#ff8a65" opacity="0.04" filter="url(#tp-blur2)"/>

  <!-- Setting sun (half below horizon arc) -->
  <circle cx="400" cy="400" r="50" fill="url(#tp-sunGlow)" filter="url(#tp-blur2)"/>
  <circle cx="400" cy="400" r="25" fill="#ff8a65" opacity="0.12" filter="url(#tp-blur3)"/>
  <circle cx="400" cy="400" r="12" fill="#ffab91" opacity="0.2" filter="url(#tp-blur3)"/>
  <circle cx="400" cy="400" r="5" fill="#ffccbc" opacity="0.35"/>

  <!-- Sunset arc -->
  <path d="M200 400 Q300 350, 400 340 Q500 350, 600 400" stroke="#ef6c00" stroke-width="0.8" fill="none" opacity="0.15"/>
  <path d="M150 400 Q275 330, 400 315 Q525 330, 650 400" stroke="#ff8a65" stroke-width="0.5" fill="none" opacity="0.1"/>

  <!-- Stars field (emerging in upper portion) -->
  <circle cx="88" cy="55" r="1.3" fill="#ffffff" opacity="0.75"/>
  <circle cx="225" cy="42" r="0.9" fill="#c5cae9" opacity="0.7"/>
  <circle cx="370" cy="68" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="528" cy="52" r="1.1" fill="#9fa8da" opacity="0.7"/>
  <circle cx="652" cy="82" r="1.4" fill="#ffffff" opacity="0.7"/>
  <circle cx="708" cy="35" r="1" fill="#c5cae9" opacity="0.6"/>
  <circle cx="72" cy="175" r="1.2" fill="#ffffff" opacity="0.65"/>
  <circle cx="738" cy="195" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="55" cy="300" r="0.9" fill="#c5cae9" opacity="0.5"/>
  <circle cx="750" cy="280" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="140" cy="130" r="1.6" fill="#ffffff" opacity="0.8"/>
  <circle cx="668" cy="145" r="0.8" fill="#9fa8da" opacity="0.6"/>
  <circle cx="185" cy="250" r="1" fill="#ffffff" opacity="0.55"/>
  <circle cx="615" cy="230" r="1.2" fill="#c5cae9" opacity="0.5"/>
  <circle cx="482" cy="95" r="0.9" fill="#ffffff" opacity="0.7"/>
  <circle cx="320" cy="120" r="1.1" fill="#ffffff" opacity="0.65"/>
  <circle cx="560" cy="110" r="0.7" fill="#9fa8da" opacity="0.6"/>
  <circle cx="430" cy="38" r="1.3" fill="#ffffff" opacity="0.75"/>
  <circle cx="160" cy="80" r="0.8" fill="#c5cae9" opacity="0.65"/>

  <!-- Emerging stars (fainter, near horizon) -->
  <circle cx="250" cy="340" r="0.7" fill="#ffffff" opacity="0.25"/>
  <circle cx="550" cy="330" r="0.6" fill="#ffffff" opacity="0.2"/>
  <circle cx="180" cy="370" r="0.5" fill="#c5cae9" opacity="0.15"/>
  <circle cx="620" cy="360" r="0.6" fill="#ffffff" opacity="0.18"/>

  <!-- Below-horizon dark area -->
  <rect x="0" y="400" width="800" height="400" fill="#050512" opacity="0.4"/>

  <!-- Reflection on dark area -->
  <ellipse cx="400" cy="440" rx="100" ry="30" fill="#ef6c00" opacity="0.03" filter="url(#tp-blur1)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#ffffff" letter-spacing="3" opacity="0.9" filter="url(#tp-glow)">TWILIGHT PASSAGE</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9fa8da" letter-spacing="6" opacity="0.65">EVENING TRANSITION</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#5c6bc0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#7986cb" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3949ab" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>