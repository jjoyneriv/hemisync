<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="oc-bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#0a2e28"/>
      <stop offset="40%" stop-color="#061a16"/>
      <stop offset="100%" stop-color="#030e0c"/>
    </radialGradient>
    <radialGradient id="oc-depthGlow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#22aa88" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#118866" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#004433" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oc-rippleGlow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#33ddaa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#11aa77" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oc-depthLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11aa77" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#0d8866" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#066644" stop-opacity="0"/>
    </linearGradient>
    <filter id="oc-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="oc-blur2">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="oc-blur3">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="oc-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#oc-bg)"/>

  <!-- Deep ocean nebula glows -->
  <ellipse cx="350" cy="300" rx="250" ry="200" fill="#0d6650" opacity="0.07" filter="url(#oc-blur1)"/>
  <ellipse cx="500" cy="350" rx="200" ry="180" fill="#11aa77" opacity="0.04" filter="url(#oc-blur1)"/>
  <ellipse cx="400" cy="400" rx="280" ry="150" fill="#0d8866" opacity="0.06" filter="url(#oc-blur1)"/>

  <!-- Stars -->
  <circle cx="110" cy="65" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="240" cy="40" r="0.9" fill="#ccffee" opacity="0.5"/>
  <circle cx="370" cy="72" r="1.4" fill="#ffffff" opacity="0.7"/>
  <circle cx="510" cy="55" r="1" fill="#ccffee" opacity="0.6"/>
  <circle cx="650" cy="88" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="715" cy="42" r="0.8" fill="#ccffee" opacity="0.4"/>
  <circle cx="70" cy="180" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="730" cy="190" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="145" cy="130" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="600" cy="105" r="0.8" fill="#ccffee" opacity="0.5"/>
  <circle cx="460" cy="95" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="290" cy="115" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="555" cy="140" r="1" fill="#ccffee" opacity="0.5"/>
  <circle cx="185" cy="210" r="0.9" fill="#ffffff" opacity="0.4"/>
  <circle cx="680" cy="165" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="50" cy="280" r="0.8" fill="#ccffee" opacity="0.4"/>
  <circle cx="750" cy="300" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="390" cy="135" r="0.7" fill="#ccffee" opacity="0.5"/>

  <!-- Ocean depth layers -->
  <rect x="100" y="250" width="600" height="60" rx="30" fill="url(#oc-depthLayer)" opacity="0.5" filter="url(#oc-blur2)"/>
  <rect x="120" y="320" width="560" height="50" rx="25" fill="url(#oc-depthLayer)" opacity="0.4" filter="url(#oc-blur2)"/>
  <rect x="140" y="380" width="520" height="45" rx="22" fill="url(#oc-depthLayer)" opacity="0.35" filter="url(#oc-blur2)"/>
  <rect x="160" y="430" width="480" height="40" rx="20" fill="url(#oc-depthLayer)" opacity="0.3" filter="url(#oc-blur2)"/>

  <!-- Depth glow -->
  <ellipse cx="400" cy="350" rx="250" ry="180" fill="url(#oc-depthGlow)" filter="url(#oc-blur2)"/>

  <!-- Gentle wave forms -->
  <path d="M80,230 Q180,215 280,230 Q380,245 480,230 Q580,215 680,230 Q730,237 750,235" stroke="#33cc99" stroke-width="1.2" fill="none" opacity="0.3"/>
  <path d="M60,270 Q170,252 290,270 Q410,288 510,270 Q610,252 720,270" stroke="#44ddaa" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M90,310 Q200,295 320,310 Q440,325 540,310 Q640,295 730,310" stroke="#33cc99" stroke-width="0.8" fill="none" opacity="0.2"/>
  <path d="M70,350 Q180,338 300,350 Q420,362 530,350 Q630,338 740,350" stroke="#22bb88" stroke-width="0.7" fill="none" opacity="0.18"/>
  <path d="M100,390 Q210,380 330,390 Q450,400 550,390 Q650,380 720,390" stroke="#22aa77" stroke-width="0.6" fill="none" opacity="0.15"/>
  <path d="M110,430 Q220,422 340,430 Q460,438 560,430 Q660,422 710,430" stroke="#119966" stroke-width="0.5" fill="none" opacity="0.12"/>
  <path d="M130,465 Q240,458 350,465 Q460,472 550,465 Q640,458 700,465" stroke="#119966" stroke-width="0.4" fill="none" opacity="0.1"/>

  <!-- Circular ripples -->
  <circle cx="400" cy="310" r="30" stroke="#44ddaa" stroke-width="0.6" fill="none" opacity="0.2"/>
  <circle cx="400" cy="310" r="55" stroke="#33cc99" stroke-width="0.5" fill="none" opacity="0.17"/>
  <circle cx="400" cy="310" r="80" stroke="#22bb88" stroke-width="0.4" fill="none" opacity="0.14"/>
  <circle cx="400" cy="310" r="110" stroke="#22aa77" stroke-width="0.4" fill="none" opacity="0.11"/>
  <circle cx="400" cy="310" r="145" stroke="#119966" stroke-width="0.3" fill="none" opacity="0.08"/>
  <circle cx="400" cy="310" r="180" stroke="#118855" stroke-width="0.3" fill="none" opacity="0.06"/>

  <!-- Ripple center glow -->
  <ellipse cx="400" cy="310" rx="20" ry="20" fill="url(#oc-rippleGlow)" filter="url(#oc-blur3)"/>
  <circle cx="400" cy="310" r="3" fill="#66ffcc" opacity="0.3" filter="url(#oc-blur3)"/>

  <!-- Floating particles (underwater feel) -->
  <circle cx="320" cy="280" r="1.5" fill="#44ddaa" opacity="0.15" filter="url(#oc-blur3)"/>
  <circle cx="480" cy="350" r="1.2" fill="#33cc99" opacity="0.12" filter="url(#oc-blur3)"/>
  <circle cx="350" cy="400" r="1.8" fill="#44ddaa" opacity="0.1" filter="url(#oc-blur3)"/>
  <circle cx="460" cy="260" r="1" fill="#55eeaa" opacity="0.13" filter="url(#oc-blur3)"/>
  <circle cx="300" cy="370" r="1.4" fill="#33cc99" opacity="0.1" filter="url(#oc-blur3)"/>
  <circle cx="520" cy="290" r="1.3" fill="#44ddaa" opacity="0.12" filter="url(#oc-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#ffffff" letter-spacing="3" filter="url(#oc-glow)">OCEAN OF CALM</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#44bb88" letter-spacing="6">TOTAL RELAXATION</text>

  <!-- Decorative line -->
  <line x1="295" y1="668" x2="505" y2="668" stroke="#228866" stroke-width="0.5" opacity="0.6"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#447766" letter-spacing="4">HEMISYNC.ORG</text>
</svg>