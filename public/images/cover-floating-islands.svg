<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="fi-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0a1a2a"/>
      <stop offset="45%" stop-color="#06121c"/>
      <stop offset="100%" stop-color="#02080e"/>
    </radialGradient>
    <radialGradient id="fi-nebula1" cx="45%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#00897b" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00695c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fi-nebula2" cx="55%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#0288d1" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#01579b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fi-nebula3" cx="50%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fi-islandGlow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00838f" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fi-bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#80deea" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#b2ebf2" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#80deea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4dd0e1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fi-skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="fi-blur1">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="fi-blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="fi-blur3">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="fi-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#fi-bg)"/>

  <!-- Sky gradient wash -->
  <rect width="800" height="400" fill="url(#fi-skyGrad)"/>

  <!-- Nebula glows -->
  <ellipse cx="380" cy="300" rx="300" ry="220" fill="url(#fi-nebula1)" filter="url(#fi-blur1)"/>
  <ellipse cx="450" cy="350" rx="250" ry="200" fill="url(#fi-nebula2)" filter="url(#fi-blur1)"/>
  <ellipse cx="400" cy="260" rx="200" ry="160" fill="url(#fi-nebula3)" filter="url(#fi-blur1)"/>

  <!-- Stars -->
  <circle cx="95" cy="60" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="220" cy="45" r="0.8" fill="#b2ebf2" opacity="0.6"/>
  <circle cx="380" cy="70" r="1.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="525" cy="55" r="1" fill="#b2dfdb" opacity="0.65"/>
  <circle cx="655" cy="85" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="715" cy="35" r="0.9" fill="#b2ebf2" opacity="0.5"/>
  <circle cx="70" cy="210" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="740" cy="180" r="1" fill="#b2dfdb" opacity="0.5"/>
  <circle cx="50" cy="320" r="0.9" fill="#b2ebf2" opacity="0.5"/>
  <circle cx="760" cy="300" r="1.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="135" cy="145" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="670" cy="120" r="0.7" fill="#b2ebf2" opacity="0.6"/>
  <circle cx="475" cy="100" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="315" cy="130" r="1.1" fill="#b2dfdb" opacity="0.5"/>
  <circle cx="560" cy="110" r="0.7" fill="#ffffff" opacity="0.45"/>
  <circle cx="200" cy="95" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="600" cy="40" r="1" fill="#b2ebf2" opacity="0.6"/>

  <!-- Cloud wisps -->
  <ellipse cx="250" cy="250" rx="80" ry="15" fill="#4dd0e1" opacity="0.04" filter="url(#fi-blur1)"/>
  <ellipse cx="550" cy="200" rx="70" ry="12" fill="#80deea" opacity="0.035" filter="url(#fi-blur1)"/>
  <ellipse cx="350" cy="420" rx="90" ry="18" fill="#4dd0e1" opacity="0.03" filter="url(#fi-blur1)"/>
  <ellipse cx="500" cy="380" rx="60" ry="10" fill="#80deea" opacity="0.03" filter="url(#fi-blur1)"/>

  <!-- Floating island 1 — large center -->
  <path d="M320 320 Q340 310, 380 305 Q400 303, 420 305 Q460 310, 480 320 Q470 345, 450 360 Q430 370, 400 375 Q370 370, 350 360 Q330 345, 320 320Z"
        fill="#0a1a2a" stroke="#26a69a" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="400" cy="320" rx="80" ry="8" fill="url(#fi-islandGlow)" filter="url(#fi-blur3)" opacity="0.4"/>
  <!-- Vegetation on island 1 -->
  <line x1="370" y1="305" x2="370" y2="285" stroke="#26a69a" stroke-width="0.6" opacity="0.25"/>
  <line x1="400" y1="303" x2="400" y2="278" stroke="#4db6ac" stroke-width="0.8" opacity="0.3"/>
  <line x1="430" y1="305" x2="430" y2="288" stroke="#26a69a" stroke-width="0.5" opacity="0.2"/>
  <circle cx="400" cy="275" r="8" fill="#26a69a" opacity="0.12" filter="url(#fi-blur3)"/>
  <circle cx="370" cy="283" r="5" fill="#00897b" opacity="0.1" filter="url(#fi-blur3)"/>

  <!-- Floating island 2 — upper left -->
  <path d="M160 220 Q175 212, 200 210 Q225 212, 240 220 Q235 235, 220 242 Q200 246, 180 242 Q165 235, 160 220Z"
        fill="#0a1a2a" stroke="#00897b" stroke-width="0.6" opacity="0.4"/>
  <ellipse cx="200" cy="220" rx="40" ry="5" fill="url(#fi-islandGlow)" filter="url(#fi-blur3)" opacity="0.3"/>
  <line x1="195" y1="210" x2="195" y2="195" stroke="#26a69a" stroke-width="0.5" opacity="0.2"/>
  <circle cx="195" cy="193" r="5" fill="#00897b" opacity="0.08" filter="url(#fi-blur3)"/>

  <!-- Floating island 3 — upper right -->
  <path d="M560 190 Q578 180, 600 178 Q622 180, 640 190 Q636 208, 620 215 Q600 220, 580 215 Q564 208, 560 190Z"
        fill="#0a1a2a" stroke="#00897b" stroke-width="0.6" opacity="0.4"/>
  <ellipse cx="600" cy="190" rx="40" ry="5" fill="url(#fi-islandGlow)" filter="url(#fi-blur3)" opacity="0.3"/>
  <line x1="600" y1="178" x2="600" y2="160" stroke="#4db6ac" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="158" r="5" fill="#00897b" opacity="0.08" filter="url(#fi-blur3)"/>

  <!-- Floating island 4 — lower left -->
  <path d="M140 400 Q158 392, 180 390 Q202 392, 220 400 Q216 415, 200 422 Q180 426, 160 422 Q144 415, 140 400Z"
        fill="#0a1a2a" stroke="#00695c" stroke-width="0.5" opacity="0.35"/>
  <ellipse cx="180" cy="400" rx="40" ry="5" fill="url(#fi-islandGlow)" filter="url(#fi-blur3)" opacity="0.25"/>

  <!-- Floating island 5 — lower right -->
  <path d="M580 420 Q598 412, 620 410 Q642 412, 660 420 Q656 435, 640 442 Q620 446, 600 442 Q584 435, 580 420Z"
        fill="#0a1a2a" stroke="#00695c" stroke-width="0.5" opacity="0.35"/>
  <ellipse cx="620" cy="420" rx="40" ry="5" fill="url(#fi-islandGlow)" filter="url(#fi-blur3)" opacity="0.25"/>

  <!-- Light bridges connecting islands -->
  <path d="M240 220 Q300 260, 325 315" fill="none" stroke="url(#fi-bridgeGrad)" stroke-width="0.8" opacity="0.2" filter="url(#fi-glow)"/>
  <path d="M560 190 Q520 240, 475 310" fill="none" stroke="url(#fi-bridgeGrad)" stroke-width="0.8" opacity="0.2" filter="url(#fi-glow)"/>
  <path d="M220 400 Q280 375, 330 340" fill="none" stroke="url(#fi-bridgeGrad)" stroke-width="0.6" opacity="0.15"/>
  <path d="M580 420 Q530 385, 475 345" fill="none" stroke="url(#fi-bridgeGrad)" stroke-width="0.6" opacity="0.15"/>

  <!-- Whimsical floating elements — small rocks/crystals -->
  <circle cx="300" cy="270" r="3" fill="#0a1a2a" stroke="#26a69a" stroke-width="0.4" opacity="0.3"/>
  <circle cx="510" cy="250" r="2.5" fill="#0a1a2a" stroke="#00897b" stroke-width="0.4" opacity="0.25"/>
  <circle cx="450" cy="430" r="2" fill="#0a1a2a" stroke="#00695c" stroke-width="0.3" opacity="0.2"/>
  <circle cx="340" cy="440" r="2.5" fill="#0a1a2a" stroke="#00695c" stroke-width="0.3" opacity="0.2"/>

  <!-- Falling particles / mist -->
  <circle cx="350" cy="370" r="1" fill="#80deea" opacity="0.3" filter="url(#fi-blur3)"/>
  <circle cx="440" cy="360" r="1.2" fill="#4dd0e1" opacity="0.25" filter="url(#fi-blur3)"/>
  <circle cx="280" cy="330" r="0.8" fill="#80deea" opacity="0.2" filter="url(#fi-blur3)"/>
  <circle cx="520" cy="340" r="1" fill="#4dd0e1" opacity="0.2" filter="url(#fi-blur3)"/>

  <!-- Title -->
  <text x="400" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#ffffff" letter-spacing="4" opacity="0.9" filter="url(#fi-glow)">FLOATING ISLANDS</text>

  <!-- Subtitle -->
  <text x="400" y="638" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4dd0e1" letter-spacing="5" opacity="0.65">IMAGINATION JOURNEY</text>

  <!-- Decorative line -->
  <line x1="300" y1="668" x2="500" y2="668" stroke="#00695c" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="668" r="2" fill="#4dd0e1" opacity="0.5"/>

  <!-- Branding -->
  <text x="400" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00695c" letter-spacing="4" opacity="0.5">HEMISYNC.ORG</text>
</svg>